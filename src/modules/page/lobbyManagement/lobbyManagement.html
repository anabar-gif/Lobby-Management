<template>
    <div class="lobby-root">
        <header class="lobby-header slds-p-vertical_small slds-p-horizontal_medium">
            <div class="lobby-header__inner slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-wrap slds-gutters_small">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_7-of-12">
                    <div class="slds-media slds-media_center">
                        <div class="slds-media__figure">
                            <div class="lobby-header__icon">
                                <img class="lobby-header__icon-img" src={queueIconUrl} alt="" />
                            </div>
                        </div>
                        <div class="slds-media__body">
                            <p class="lobby-header__eyebrow slds-m-bottom_xxx-small">Service Territory</p>
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-button-menu
                                    class="lobby-header__branch-menu"
                                    label={selectedBranch}
                                    variant="bare"
                                    menu-alignment="left"
                                    alternative-text="Change branch"
                                    onselect={handleBranchSelect}>
                                    <lightning-menu-item label="Business District 2"         value="Business District 2"></lightning-menu-item>
                                    <lightning-menu-item label="High Street 1"               value="High Street 1"></lightning-menu-item>
                                    <lightning-menu-item label="Market St Branch"            value="Market St Branch"></lightning-menu-item>
                                    <lightning-menu-item label="Mission St branch"           value="Mission St branch"></lightning-menu-item>
                                    <lightning-menu-item label="Scheduler DF Moscone South"  value="Scheduler DF Moscone South"></lightning-menu-item>
                                    <lightning-menu-item label="Scheduler DF Tower"          value="Scheduler DF Tower"></lightning-menu-item>
                                    <lightning-menu-item label="Virtual Retail Banking"      value="Virtual Retail Banking"></lightning-menu-item>
                                    <lightning-menu-item label="Virtual Territory"           value="Virtual Territory"></lightning-menu-item>
                                    <lightning-menu-item label="Virtual_Test"                value="Virtual_Test"></lightning-menu-item>
                                </lightning-button-menu>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_5-of-12 slds-text-align_right slds-m-top_small">
                    <div class="lobby-toolbar__row slds-grid slds-grid_vertical-align-start slds-grid_align-end slds-wrap">
                        <div class="slds-grid slds-grid_vertical-align-center slds-m-right_x-small slds-m-bottom_xx-small slds-medium-m-bottom_none">
                            <span class="lobby-toolbar__label slds-p-right_x-small">Show Waitlists</span>
                            <lightning-combobox
                                name="waitlistFilter"
                                label="Waitlist filter"
                                variant="label-hidden"
                                value={selectedWaitlistFilter}
                                placeholder="All waitlists"
                                options={waitlistFilterOptions}
                                onchange={handleWaitlistFilterChange}>
                            </lightning-combobox>
                        </div>
                        <lightning-button-icon
                            class="lobby-toolbar__refresh"
                            icon-name="utility:refresh"
                            variant="border-filled"
                            alternative-text="Refresh"
                            title="Refresh"
                            onclick={handleRefresh}>
                        </lightning-button-icon>
                    </div>
                </div>
            </div>
        </header>

        <div class="lobby-main slds-p-top_medium slds-p-bottom_large slds-p-horizontal_medium">
            <lightning-layout multiple-rows="true" pull-to-boundary="small" class="lobby-layout">
                <lightning-layout-item size="12" large-device-size="4" padding="horizontal-small">
                    <article class="lobby-card slds-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate slds-col">
                                <div class="slds-media__body slds-has-flexi-truncate">
                                    <h2
                                        class="lobby-card__title slds-truncate"
                                        title="Scheduled Service Appointments">
                                        Scheduled Service Appointments
                                    </h2>
                                    <p class="lobby-card__meta slds-m-top_xx-small">{metaLinePrimary}</p>
                                    <p class="lobby-card__meta">{metaLineSecondary}</p>
                                </div>
                            </header>
                            <div class="slds-no-flex">
                                <lightning-button-icon
                                    icon-name="utility:refresh"
                                    variant="border-filled"
                                    alternative-text="Refresh"
                                    title="Refresh"
                                    onclick={handleRefresh}>
                                </lightning-button-icon>
                            </div>
                        </div>
                        <div class="lobby-card__separator-slot" aria-hidden="true">
                            <div class="lobby-card__separator-line"></div>
                        </div>
                        <div class="slds-card__body slds-card__body_inner slds-scrollable_y lobby-card__body-scroll">
                            <div class="lobby-card__heading slds-m-bottom_medium">
                                <div class="lobby-section__header slds-m-bottom_medium">
                                    <div class="lobby-section__label">Current</div>
                                    <div class="lobby-section__meta slds-m-top_xx-small">{currentSectionMetaLine}</div>
                                </div>
                                <template for:each={currentAppointments} for:item="appt">
                                    <div key={appt.id} class="lobby-appt slds-m-bottom_medium">
                                        <div class="lobby-appt__body slds-p-around_small">
                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                <div class="lobby-appt__identity">
                                                    <div
                                                        class="lobby-appt__name slds-truncate"
                                                        role="button"
                                                        tabindex="0"
                                                        title={appt.customerName}>
                                                        {appt.customerName}
                                                    </div>
                                                    <div class="lobby-appt__detail slds-m-top_xx-small slds-truncate" title={appt.subtitle}>
                                                        {appt.subtitle}
                                                    </div>
                                                </div>
                                                <div class="slds-col slds-no-flex slds-grid slds-grid_vertical-align-center slds-m-left_x-small">
                                                    <template lwc:if={appt.showCheckin}>
                                                        <lightning-button
                                                            label="Checkin"
                                                            variant="neutral"
                                                            data-id={appt.id}
                                                            onclick={handleCheckin}>
                                                        </lightning-button>
                                                    </template>
                                                    <lightning-button-icon
                                                        class="lobby-appt__menu-btn"
                                                        icon-name="utility:down"
                                                        variant="border-filled"
                                                        alternative-text="Appointment actions"
                                                        title="Appointment actions"
                                                        onclick={handleApptMenu}>
                                                    </lightning-button-icon>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="lobby-appt__footer slds-p-horizontal_small slds-p-vertical_x-small">
                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                <div class="lobby-appt__footer-left slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate">
                                                    <lightning-icon
                                                        class="lobby-appt__clock-icon slds-m-right_xx-small"
                                                        icon-name="utility:clock"
                                                        size="small"
                                                        alternative-text="">
                                                    </lightning-icon>
                                                    <span class="lobby-appt__slot slds-truncate">{appt.slot}</span>
                                                </div>
                                                <template lwc:if={appt.checkedIn}>
                                                    <span class="lobby-appt__checked-in-badge slds-m-left_x-small">Checked in</span>
                                                </template>
                                                <template lwc:if={appt.showWaitAlert}>
                                                    <div class="lobby-appt__wait slds-grid slds-grid_vertical-align-center slds-no-flex slds-m-left_x-small">
                                                        <lightning-icon
                                                            class="lobby-appt__wait-clock slds-m-right_xx-small"
                                                            icon-name="utility:clock"
                                                            size="small"
                                                            alternative-text="">
                                                        </lightning-icon>
                                                        <span class="lobby-appt__wait-label">{appt.waitLabel}</span>
                                                        <span class="lobby-appt__wait-time slds-m-left_xx-small">{appt.waitTime}</span>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <div class="slds-m-top_large">
                                <div class="lobby-section__header slds-m-bottom_medium">
                                    <div class="lobby-section__label">Upcoming</div>
                                    <div class="lobby-section__meta slds-m-top_xx-small">{upcomingSectionMetaLine}</div>
                                </div>
                                <template for:each={upcomingAppointments} for:item="appt">
                                    <div key={appt.id} class="lobby-appt slds-m-bottom_medium">
                                        <div class="lobby-appt__body slds-p-around_small">
                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                <div class="lobby-appt__identity">
                                                    <div
                                                        class="lobby-appt__name slds-truncate"
                                                        role="button"
                                                        tabindex="0"
                                                        title={appt.customerName}>
                                                        {appt.customerName}
                                                    </div>
                                                    <div class="lobby-appt__detail slds-m-top_xx-small slds-truncate" title={appt.subtitle}>
                                                        {appt.subtitle}
                                                    </div>
                                                </div>
                                                <div class="slds-col slds-no-flex slds-grid slds-grid_vertical-align-center slds-m-left_x-small">
                                                    <lightning-button
                                                        label="Checkin"
                                                        variant="neutral"
                                                        data-id={appt.id}
                                                        onclick={handleCheckin}>
                                                    </lightning-button>
                                                    <lightning-button-icon
                                                        class="lobby-appt__menu-btn"
                                                        icon-name="utility:down"
                                                        variant="border-filled"
                                                        alternative-text="Appointment actions"
                                                        title="Appointment actions"
                                                        onclick={handleApptMenu}>
                                                    </lightning-button-icon>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="lobby-appt__footer slds-p-horizontal_small slds-p-vertical_x-small">
                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                <div class="lobby-appt__footer-left slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate">
                                                    <lightning-icon
                                                        class="lobby-appt__clock-icon slds-m-right_xx-small"
                                                        icon-name="utility:clock"
                                                        size="small"
                                                        alternative-text="">
                                                    </lightning-icon>
                                                    <span class="lobby-appt__slot slds-truncate">{appt.slot}</span>
                                                </div>
                                                <template lwc:if={appt.checkedIn}>
                                                    <span class="lobby-appt__checked-in-badge slds-m-left_x-small">Checked in</span>
                                                </template>
                                                <template lwc:if={appt.showWaitAlert}>
                                                    <div class="lobby-appt__wait slds-grid slds-grid_vertical-align-center slds-no-flex slds-m-left_x-small">
                                                        <lightning-icon
                                                            class="lobby-appt__wait-clock slds-m-right_xx-small"
                                                            icon-name="utility:clock"
                                                            size="small"
                                                            alternative-text="">
                                                        </lightning-icon>
                                                        <span class="lobby-appt__wait-label">{appt.waitLabel}</span>
                                                        <span class="lobby-appt__wait-time slds-m-left_xx-small">{appt.waitTime}</span>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </article>
                </lightning-layout-item>

                <lightning-layout-item size="12" large-device-size="4" padding="horizontal-small">
                    <article class="lobby-card slds-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate slds-col">
                                <div class="slds-media__figure">
                                    <span class="lobby-queue-dot" aria-hidden="true"></span>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="lobby-queue-title">General Banking</h2>
                                    <p class="lobby-card__meta slds-m-top_xx-small">{generalQueueMetaLeft}</p>
                                    <p class="lobby-card__meta">{generalQueueMetaRight}</p>
                                </div>
                            </header>
                            <div class="slds-no-flex">
                                <lightning-button-group class="lobby-queue-button-group">
                                    <lightning-button
                                        label="Check In"
                                        variant="neutral"
                                        title="Check In"
                                        onclick={handleQueueCheckIn}>
                                    </lightning-button>
                                    <lightning-button-icon
                                        icon-name="utility:refresh"
                                        variant="border-filled"
                                        alternative-text="Refresh queue"
                                        title="Refresh"
                                        onclick={handleRefresh}>
                                    </lightning-button-icon>
                                </lightning-button-group>
                            </div>
                        </div>
                        <div class="lobby-card__separator-slot" aria-hidden="true">
                            <div class="lobby-card__separator-line"></div>
                        </div>
                        <div class="slds-card__body slds-card__body_inner lobby-card__body-queue">
                            <div class="lobby-queue-toolbar">
                                <lightning-input
                                    type="checkbox"
                                    label="Expand all topics to view the waitlist details"
                                    checked={showAllTopicsGeneral}
                                    onchange={handleShowAllTopicsGeneral}>
                                </lightning-input>
                            </div>
                            <lightning-accordion
                                class="lobby-queue-accordion"
                                allow-multiple-sections-open
                                active-section-name={generalBankingOpenSections}
                                onsectiontoggle={handleGeneralAccordionToggle}>
                                <template for:each={generalBankingTopics} for:item="topic">
                                    <lightning-accordion-section key={topic.id} name={topic.id} label={topic.label}>
                                        <template for:each={topic.participants} for:item="row">
                                            <div key={row.id} class="lobby-queue-participant slds-m-top_small">
                                                <div class="lobby-queue-participant__head slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                    <div class="lobby-queue-participant__identity">
                                                        <div class="lobby-queue-participant__title-row">
                                                            <span class="lobby-queue-participant__title slds-truncate">
                                                                <span class="lobby-queue-participant__ordinal">{row.ordinal}</span><span
                                                                    class="lobby-queue-participant__workid">{row.workItemId}</span><span
                                                                    class="lobby-queue-participant__mid"> • </span><span
                                                                    class="lobby-queue-participant__link">{row.linkLabel}</span>
                                                            </span>
                                                        </div>
                                                        <div class="lobby-queue-participant__topic slds-truncate slds-m-top_xx-small">
                                                            {row.topic}
                                                        </div>
                                                    </div>
                                                    <div class="slds-no-flex slds-m-left_x-small lobby-queue-participant__actions">
                                                        <lightning-button-icon
                                                            icon-name="utility:down"
                                                            variant="border-filled"
                                                            alternative-text="Participant actions"
                                                            title="Participant actions"
                                                            onclick={handleQueueParticipantMenu}>
                                                        </lightning-button-icon>
                                                    </div>
                                                </div>
                                                <div class="lobby-queue-participant__divider" aria-hidden="true"></div>
                                                <div class="lobby-queue-participant__times">
                                                    <div class="lobby-queue-participant__times-inner">
                                                        <div class="lobby-queue-participant__time-cell">
                                                            <lightning-icon
                                                                icon-name="utility:success"
                                                                variant="success"
                                                                size="x-small"
                                                                class="lobby-queue-participant__time-icon lobby-queue-participant__time-icon_checkin"
                                                                alternative-text="Check-in">
                                                            </lightning-icon>
                                                            <span class="lobby-queue-participant__time-inline">
                                                                <span class="lobby-queue-participant__time-lbl">Check-in Time:</span>
                                                                <span class="lobby-queue-participant__time-val">{row.checkInTime}</span>
                                                            </span>
                                                        </div>
                                                        <div class="lobby-queue-participant__time-cell">
                                                            <lightning-icon
                                                                icon-name="utility:clock"
                                                                size="x-small"
                                                                class="lobby-queue-participant__time-icon lobby-queue-participant__time-icon_wait"
                                                                alternative-text="Wait time">
                                                            </lightning-icon>
                                                            <span class="lobby-queue-participant__time-inline">
                                                                <span class="lobby-queue-participant__time-lbl">Wait Time :</span>
                                                                <span class="lobby-queue-participant__time-val">{row.waitTime}</span>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </lightning-accordion-section>
                                </template>
                            </lightning-accordion>

                        </div>

                        <template lwc:if={showCheckinComposer}>
                            <div class="lobby-checkin-overlay-scrim" onclick={handleCloseCheckinComposer}></div>
                            <div class="lobby-checkin-overlay">
                                <!-- Header -->
                                <div class="lobby-checkin-overlay__header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                        <span class="lobby-checkin-overlay__title">Checkin Customer</span>
                                    <button
                                        class="slds-button slds-button_icon lobby-checkin-overlay__close"
                                        title="Close"
                                        onclick={handleCloseCheckinComposer}>
                                        <lightning-icon icon-name="utility:close" size="x-small" alternative-text="Close"></lightning-icon>
                                    </button>
                                </div>
                                <!-- Body -->
                                <div class="lobby-checkin-overlay__body">
                                    <!-- Account Status -->
                                    <div class="lobby-checkin-field">
                                        <fieldset class="slds-form-element">
                                            <legend class="lobby-checkin-label">
                                                Account Status<abbr class="lobby-checkin-required" title="required">*</abbr>
                                            </legend>
                                            <div class="slds-form-element__control slds-m-top_xx-small">
                                                <div class="slds-grid slds-gutters_small">
                                                    <div class="slds-col">
                                                        <span class="slds-radio">
                                                            <input type="radio" id="ci-existing" name="ci-guest-type" value="existing" checked />
                                                            <label class="slds-radio__label" for="ci-existing">
                                                                <span class="slds-radio_faux"></span>
                                                                <span class="slds-form-element__label">Existing Participant</span>
                                                            </label>
                                                        </span>
                                                    </div>
                                                    <div class="slds-col">
                                                        <span class="slds-radio">
                                                            <input type="radio" id="ci-new" name="ci-guest-type" value="new" />
                                                            <label class="slds-radio__label" for="ci-new">
                                                                <span class="slds-radio_faux"></span>
                                                                <span class="slds-form-element__label">New Participant</span>
                                                            </label>
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </fieldset>
                                    </div>
                                    <!-- Participant grouped combobox -->
                                    <div class="lobby-checkin-field lobby-participant-field">
                                        <label class="lobby-checkin-label">
                                            Participant<abbr class="lobby-checkin-required" title="required">*</abbr>
                                        </label>
                                        <div class="lobby-grouped-combobox">
                                            <!-- Type selector -->
                                            <div class="lobby-grouped-combobox__type-wrap">
                                                <button type="button"
                                                    class="lobby-grouped-combobox__type-btn"
                                                    onclick={handleParticipantTypeToggle}
                                                    onblur={handleParticipantTypeBlur}>
                                                    <span class="lobby-grouped-combobox__type-label">{selectedParticipantType}</span>
                                                    <lightning-icon icon-name="utility:down" size="x-small" alternative-text="Open"></lightning-icon>
                                                </button>
                                                <template lwc:if={showParticipantTypeDropdown}>
                                                    <div class="lobby-grouped-combobox__type-dropdown">
                                                        <ul role="listbox">
                                                            <template for:each={participantTypeOptions} for:item="opt">
                                                                <li key={opt.id}
                                                                    class="lobby-grouped-combobox__type-option"
                                                                    data-id={opt.id}
                                                                    role="option"
                                                                    onclick={handleParticipantTypeSelect}>
                                                                    <lightning-icon icon-name={opt.icon} size="small" alternative-text={opt.label}></lightning-icon>
                                                                    <span>{opt.label}</span>
                                                                </li>
                                                            </template>
                                                        </ul>
                                                    </div>
                                                </template>
                                            </div>
                                            <!-- Search field -->
                                            <div class="lobby-grouped-combobox__search-wrap">
                                                <input
                                                    type="text"
                                                    class="lobby-grouped-combobox__search-input"
                                                    placeholder="Search..."
                                                    value={participantSearch}
                                                    onfocus={handleParticipantFocus}
                                                    oninput={handleParticipantInput}
                                                    onblur={handleParticipantBlur} />
                                                <lightning-icon class="lobby-grouped-combobox__search-icon" icon-name="utility:search" size="x-small" alternative-text="Search"></lightning-icon>
                                                <template lwc:if={showParticipantDropdown}>
                                                    <div class="lobby-participant-combobox__dropdown">
                                                        <div class="lobby-participant-combobox__group-label">Recent Items</div>
                                                        <ul class="lobby-participant-combobox__list" role="listbox">
                                                            <template for:each={filteredParticipants} for:item="item">
                                                                <li key={item.id}
                                                                    class="lobby-participant-combobox__option"
                                                                    data-id={item.id}
                                                                    role="option"
                                                                    onclick={handleParticipantSelect}>
                                                                    <div class="lobby-participant-combobox__option-icon">
                                                                        <lightning-icon icon-name={item.icon} size="small" alternative-text="Account"></lightning-icon>
                                                                    </div>
                                                                    <div class="lobby-participant-combobox__option-text">
                                                                        <div class="lobby-participant-combobox__option-name">{item.label}</div>
                                                                        <template lwc:if={item.meta}>
                                                                            <div class="lobby-participant-combobox__option-meta">{item.meta}</div>
                                                                        </template>
                                                                    </div>
                                                                </li>
                                                            </template>
                                                        </ul>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Work Topic -->
                                    <div class="lobby-checkin-field">
                                        <label class="lobby-checkin-label" for="ci-topic">
                                            Work Topic<abbr class="lobby-checkin-required" title="required">*</abbr>
                                        </label>
                                        <lightning-combobox
                                            id="ci-topic"
                                            label="Work Topic"
                                            variant="label-hidden"
                                            value="business-checking"
                                            options={checkinTopicOptions}>
                                        </lightning-combobox>
                                    </div>
                                    <!-- Description -->
                                    <div class="lobby-checkin-field">
                                        <label class="lobby-checkin-label" for="ci-desc">Description</label>
                                        <lightning-textarea
                                            id="ci-desc"
                                            label="Description"
                                            variant="label-hidden"
                                            placeholder="Enter a description for participant's visit..."
                                            max-length="500">
                                        </lightning-textarea>
                                    </div>
                                    <!-- Service Resource -->
                                    <div class="lobby-checkin-field">
                                        <label class="lobby-checkin-label" for="ci-resource">Service Resource</label>
                                        <lightning-combobox
                                            id="ci-resource"
                                            label="Service Resource"
                                            variant="label-hidden"
                                            value="adam-milne"
                                            options={checkinResourceOptions}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                                <!-- Footer -->
                                <div class="lobby-checkin-overlay__footer">
                                    <lightning-button
                                        label="Check In"
                                        variant="brand"
                                        onclick={handleCloseCheckinComposer}>
                                    </lightning-button>
                                </div>
                            </div>
                        </template>
                    </article>
                </lightning-layout-item>

                <lightning-layout-item size="12" large-device-size="4" padding="horizontal-small">
                    <article class="lobby-card slds-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate slds-col">
                                <div class="slds-media__figure">
                                    <span class="lobby-queue-dot" aria-hidden="true"></span>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="lobby-queue-title">Investment Banking</h2>
                                    <p class="lobby-card__meta slds-m-top_xx-small">{investmentQueueMetaLeft}</p>
                                    <p class="lobby-card__meta">{investmentQueueMetaRight}</p>
                                </div>
                            </header>
                            <div class="slds-no-flex">
                                <lightning-button-group class="lobby-queue-button-group">
                                    <lightning-button
                                        label="Check In"
                                        variant="neutral"
                                        title="Check In"
                                        onclick={handleInvestmentQueueCheckIn}>
                                    </lightning-button>
                                    <lightning-button-icon
                                        icon-name="utility:refresh"
                                        variant="border-filled"
                                        alternative-text="Refresh queue"
                                        title="Refresh"
                                        onclick={handleRefresh}>
                                    </lightning-button-icon>
                                </lightning-button-group>
                            </div>
                        </div>
                        <div class="lobby-card__separator-slot" aria-hidden="true">
                            <div class="lobby-card__separator-line"></div>
                        </div>
                        <div class="slds-card__body slds-card__body_inner lobby-card__body-queue">
                            <div class="lobby-queue-toolbar">
                                <lightning-input
                                    type="checkbox"
                                    label="Expand all topics to view the waitlist details"
                                    checked={showAllTopicsInvestment}
                                    onchange={handleShowAllTopicsInvestment}>
                                </lightning-input>
                            </div>
                            <lightning-accordion
                                class="lobby-queue-accordion"
                                active-section-name={investmentBankingOpenSection}
                                onsectiontoggle={handleInvestmentAccordionToggle}>
                                <template for:each={investmentBankingTopics} for:item="topic">
                                    <lightning-accordion-section key={topic.id} name={topic.id} label={topic.label}>
                                        <template for:each={topic.participants} for:item="row">
                                            <div key={row.id} class="lobby-queue-participant slds-m-top_small">
                                                <div class="lobby-queue-participant__head slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                    <div class="lobby-queue-participant__identity">
                                                        <div class="lobby-queue-participant__title-row">
                                                            <span class="lobby-queue-participant__title slds-truncate">
                                                                <span class="lobby-queue-participant__ordinal">{row.ordinal}</span><span
                                                                    class="lobby-queue-participant__workid">{row.workItemId}</span><span
                                                                    class="lobby-queue-participant__mid"> • </span><span
                                                                    class="lobby-queue-participant__link">{row.linkLabel}</span>
                                                            </span>
                                                        </div>
                                                        <div class="lobby-queue-participant__topic slds-truncate slds-m-top_xx-small">
                                                            {row.topic}
                                                        </div>
                                                    </div>
                                                    <div class="slds-no-flex slds-m-left_x-small lobby-queue-participant__actions">
                                                        <lightning-button-icon
                                                            icon-name="utility:down"
                                                            variant="border-filled"
                                                            alternative-text="Participant actions"
                                                            title="Participant actions"
                                                            onclick={handleQueueParticipantMenu}>
                                                        </lightning-button-icon>
                                                    </div>
                                                </div>
                                                <div class="lobby-queue-participant__divider" aria-hidden="true"></div>
                                                <div class="lobby-queue-participant__times">
                                                    <div class="lobby-queue-participant__times-inner">
                                                        <div class="lobby-queue-participant__time-cell">
                                                            <lightning-icon
                                                                icon-name="utility:success"
                                                                variant="success"
                                                                size="x-small"
                                                                class="lobby-queue-participant__time-icon lobby-queue-participant__time-icon_checkin"
                                                                alternative-text="Check-in">
                                                            </lightning-icon>
                                                            <span class="lobby-queue-participant__time-inline">
                                                                <span class="lobby-queue-participant__time-lbl">Check-in Time:</span>
                                                                <span class="lobby-queue-participant__time-val">{row.checkInTime}</span>
                                                            </span>
                                                        </div>
                                                        <div class="lobby-queue-participant__time-cell">
                                                            <lightning-icon
                                                                icon-name="utility:clock"
                                                                size="x-small"
                                                                class="lobby-queue-participant__time-icon lobby-queue-participant__time-icon_wait"
                                                                alternative-text="Wait time">
                                                            </lightning-icon>
                                                            <span class="lobby-queue-participant__time-inline">
                                                                <span class="lobby-queue-participant__time-lbl">Wait Time :</span>
                                                                <span class="lobby-queue-participant__time-val">{row.waitTime}</span>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </lightning-accordion-section>
                                </template>
                            </lightning-accordion>
                        </div>

                        <template lwc:if={showCheckinComposerInvestment}>
                            <div class="lobby-checkin-overlay-scrim" onclick={handleCloseInvestmentCheckinComposer}></div>
                            <div class="lobby-checkin-overlay">
                                <div class="lobby-checkin-overlay__header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                    <span class="lobby-checkin-overlay__title">Checkin Customer</span>
                                    <button
                                        class="slds-button slds-button_icon lobby-checkin-overlay__close"
                                        title="Close"
                                        onclick={handleCloseInvestmentCheckinComposer}>
                                        <lightning-icon icon-name="utility:close" size="x-small" alternative-text="Close"></lightning-icon>
                                    </button>
                                </div>
                                <div class="lobby-checkin-overlay__body">
                                    <div class="lobby-checkin-field">
                                        <fieldset class="slds-form-element">
                                            <legend class="lobby-checkin-label">
                                                Account Status<abbr class="lobby-checkin-required" title="required">*</abbr>
                                            </legend>
                                            <div class="slds-form-element__control slds-m-top_xx-small">
                                                <div class="slds-grid slds-gutters_small">
                                                    <div class="slds-col">
                                                        <span class="slds-radio">
                                                            <input type="radio" id="ib-ci-existing" name="ib-ci-guest-type" value="existing" checked />
                                                            <label class="slds-radio__label" for="ib-ci-existing">
                                                                <span class="slds-radio_faux"></span>
                                                                <span class="slds-form-element__label">Existing Participant</span>
                                                            </label>
                                                        </span>
                                                    </div>
                                                    <div class="slds-col">
                                                        <span class="slds-radio">
                                                            <input type="radio" id="ib-ci-new" name="ib-ci-guest-type" value="new" />
                                                            <label class="slds-radio__label" for="ib-ci-new">
                                                                <span class="slds-radio_faux"></span>
                                                                <span class="slds-form-element__label">New Participant</span>
                                                            </label>
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </fieldset>
                                    </div>
                                    <div class="lobby-checkin-field lobby-participant-field">
                                        <label class="lobby-checkin-label">
                                            Participant<abbr class="lobby-checkin-required" title="required">*</abbr>
                                        </label>
                                        <div class="lobby-grouped-combobox">
                                            <!-- Type selector -->
                                            <div class="lobby-grouped-combobox__type-wrap">
                                                <button type="button"
                                                    class="lobby-grouped-combobox__type-btn"
                                                    onclick={handleParticipantTypeToggleInvestment}
                                                    onblur={handleParticipantTypeBlurInvestment}>
                                                    <span class="lobby-grouped-combobox__type-label">{selectedParticipantTypeInvestment}</span>
                                                    <lightning-icon icon-name="utility:down" size="x-small" alternative-text="Open"></lightning-icon>
                                                </button>
                                                <template lwc:if={showParticipantTypeDropdownInvestment}>
                                                    <div class="lobby-grouped-combobox__type-dropdown">
                                                        <ul role="listbox">
                                                            <template for:each={participantTypeOptions} for:item="opt">
                                                                <li key={opt.id}
                                                                    class="lobby-grouped-combobox__type-option"
                                                                    data-id={opt.id}
                                                                    role="option"
                                                                    onclick={handleParticipantTypeSelectInvestment}>
                                                                    <lightning-icon icon-name={opt.icon} size="small" alternative-text={opt.label}></lightning-icon>
                                                                    <span>{opt.label}</span>
                                                                </li>
                                                            </template>
                                                        </ul>
                                                    </div>
                                                </template>
                                            </div>
                                            <!-- Search field -->
                                            <div class="lobby-grouped-combobox__search-wrap">
                                                <input
                                                    type="text"
                                                    class="lobby-grouped-combobox__search-input"
                                                    placeholder="Search..."
                                                    value={participantSearchInvestment}
                                                    onfocus={handleParticipantFocusInvestment}
                                                    oninput={handleParticipantInputInvestment}
                                                    onblur={handleParticipantBlurInvestment} />
                                                <lightning-icon class="lobby-grouped-combobox__search-icon" icon-name="utility:search" size="x-small" alternative-text="Search"></lightning-icon>
                                                <template lwc:if={showParticipantDropdownInvestment}>
                                                    <div class="lobby-participant-combobox__dropdown">
                                                        <div class="lobby-participant-combobox__group-label">Recent Items</div>
                                                        <ul class="lobby-participant-combobox__list" role="listbox">
                                                            <template for:each={filteredParticipantsInvestment} for:item="item">
                                                                <li key={item.id}
                                                                    class="lobby-participant-combobox__option"
                                                                    data-id={item.id}
                                                                    role="option"
                                                                    onclick={handleParticipantSelectInvestment}>
                                                                    <div class="lobby-participant-combobox__option-icon">
                                                                        <lightning-icon icon-name={item.icon} size="small" alternative-text="Account"></lightning-icon>
                                                                    </div>
                                                                    <div class="lobby-participant-combobox__option-text">
                                                                        <div class="lobby-participant-combobox__option-name">{item.label}</div>
                                                                        <template lwc:if={item.meta}>
                                                                            <div class="lobby-participant-combobox__option-meta">{item.meta}</div>
                                                                        </template>
                                                                    </div>
                                                                </li>
                                                            </template>
                                                        </ul>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="lobby-checkin-field">
                                        <label class="lobby-checkin-label" for="ib-ci-topic">
                                            Work Topic<abbr class="lobby-checkin-required" title="required">*</abbr>
                                        </label>
                                        <lightning-combobox
                                            id="ib-ci-topic"
                                            label="Work Topic"
                                            variant="label-hidden"
                                            value="business-checking"
                                            options={checkinTopicOptions}>
                                        </lightning-combobox>
                                    </div>
                                    <div class="lobby-checkin-field">
                                        <label class="lobby-checkin-label" for="ib-ci-desc">Description</label>
                                        <lightning-textarea
                                            id="ib-ci-desc"
                                            label="Description"
                                            variant="label-hidden"
                                            placeholder="Enter a description for participant's visit..."
                                            max-length="500">
                                        </lightning-textarea>
                                    </div>
                                    <div class="lobby-checkin-field">
                                        <label class="lobby-checkin-label" for="ib-ci-resource">Service Resource</label>
                                        <lightning-combobox
                                            id="ib-ci-resource"
                                            label="Service Resource"
                                            variant="label-hidden"
                                            value="adam-milne"
                                            options={checkinResourceOptions}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                                <div class="lobby-checkin-overlay__footer">
                                    <lightning-button
                                        label="Check In"
                                        variant="brand"
                                        onclick={handleCloseInvestmentCheckinComposer}>
                                    </lightning-button>
                                </div>
                            </div>
                        </template>
                    </article>
                </lightning-layout-item>
            </lightning-layout>
        </div>
    </div>
</template>
