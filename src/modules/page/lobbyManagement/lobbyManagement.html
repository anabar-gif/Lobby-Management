<template>
    <div class="lobby-root">

        <header class="lobby-header slds-p-vertical_small slds-p-horizontal_medium">
            <div class="lobby-header__inner slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-wrap slds-gutters_small">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_7-of-12">
                    <div class="slds-media slds-media_center">
                        <div class="slds-media__figure">
                            <div class="lobby-header__icon">
                                <img class="lobby-header__icon-img" src="/images/queue-icon.png" alt="Queue" />
                            </div>
                        </div>
                        <div class="slds-media__body">
                            <p class="lobby-header__eyebrow slds-m-bottom_xxx-small">Service Territory</p>
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-button-menu
                                    class="lobby-header__branch-menu"
                                    label={selectedBranch}
                                    variant="bare"
                                    menu-alignment="left"
                                    alternative-text="Change branch"
                                    onselect={handleBranchSelect}>
                                    <lightning-menu-item label="Business District 2"         value="Business District 2"></lightning-menu-item>
                                    <lightning-menu-item label="High Street 1"               value="High Street 1"></lightning-menu-item>
                                    <lightning-menu-item label="Market St Branch"            value="Market St Branch"></lightning-menu-item>
                                    <lightning-menu-item label="Mission St branch"           value="Mission St branch"></lightning-menu-item>
                                    <lightning-menu-item label="Scheduler DF Moscone South"  value="Scheduler DF Moscone South"></lightning-menu-item>
                                    <lightning-menu-item label="Scheduler DF Tower"          value="Scheduler DF Tower"></lightning-menu-item>
                                    <lightning-menu-item label="Virtual Retail Banking"      value="Virtual Retail Banking"></lightning-menu-item>
                                    <lightning-menu-item label="Virtual Territory"           value="Virtual Territory"></lightning-menu-item>
                                    <lightning-menu-item label="Virtual_Test"                value="Virtual_Test"></lightning-menu-item>
                                </lightning-button-menu>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_5-of-12 slds-text-align_right slds-m-top_small">
                    <div class="lobby-toolbar__row slds-grid slds-grid_vertical-align-start slds-grid_align-end slds-wrap">
                        <div class="slds-grid slds-grid_vertical-align-center slds-m-right_x-small slds-m-bottom_xx-small slds-medium-m-bottom_none">
                            <span class="lobby-toolbar__label slds-p-right_x-small">Show Waitlists</span>
                            <lightning-combobox
                                name="waitlistFilter"
                                label="Waitlist filter"
                                variant="label-hidden"
                                value={selectedWaitlistFilter}
                                placeholder="All waitlists"
                                options={waitlistFilterOptions}
                                onchange={handleWaitlistFilterChange}>
                            </lightning-combobox>
                        </div>
                        <lightning-button-icon
                            class="lobby-toolbar__refresh"
                            icon-name="utility:refresh"
                            variant="border-filled"
                            alternative-text="Refresh"
                            title="Refresh"
                            onclick={handleRefresh}>
                        </lightning-button-icon>
                    </div>
                </div>
            </div>
        </header>

        <div class="lobby-main slds-p-top_medium slds-p-bottom_large slds-p-horizontal_medium">
            <lightning-layout multiple-rows="true" pull-to-boundary="small" class="lobby-layout">
                <lightning-layout-item size="12" large-device-size="4" padding="horizontal-small">
                    <article class="lobby-card slds-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate slds-col">
                                <div class="slds-media__body slds-has-flexi-truncate">
                                    <h2
                                        class="lobby-card__title slds-truncate"
                                        title="Scheduled Appointments">
                                        Scheduled Appointments
                                    </h2>
                                    <p class="lobby-card__meta slds-m-top_xx-small">{metaLinePrimary}</p>
                                    <p class="lobby-card__meta">{metaLineSecondary}</p>
                                </div>
                            </header>
                            <div class="slds-no-flex">
                                <lightning-button-icon
                                    icon-name="utility:refresh"
                                    variant="border-filled"
                                    alternative-text="Refresh"
                                    title="Refresh"
                                    onclick={handleRefresh}>
                                </lightning-button-icon>
                            </div>
                        </div>
                        <div class="lobby-card__separator-slot" aria-hidden="true">
                            <div class="lobby-card__separator-line"></div>
                        </div>
                        <div class="slds-card__body slds-card__body_inner slds-scrollable_y lobby-card__body-scroll">
                            <div class="lobby-card__heading slds-m-bottom_medium">
                                <div class="lobby-section__header slds-m-bottom_medium">
                                    <div class="lobby-section__label">Current</div>
                                    <div class="lobby-section__meta slds-m-top_xx-small">{currentSectionMetaLine}</div>
                                </div>
                                <template for:each={currentAppointmentsView} for:item="appt">
                                    <div key={appt.id} class="lobby-appt slds-m-bottom_medium">
                                        <div class="lobby-appt__body slds-p-around_small">
                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                <div class="lobby-appt__identity">
                                                    <div
                                                        class="lobby-appt__name slds-truncate"
                                                        role="button"
                                                        tabindex="0"
                                                        title={appt.customerName}>
                                                        {appt.customerName}
                                                    </div>
                                                    <div class="lobby-appt__detail slds-m-top_xx-small slds-truncate" title={appt.subtitle}>
                                                        {appt.subtitle}
                                                    </div>
                                                    <template lwc:if={appt.serviceApptLabel}>
                                                        <div class="lobby-appt__detail slds-m-top_xx-small slds-truncate" title={appt.serviceApptLabel}>
                                                            {appt.serviceApptLabel}
                                                        </div>
                                                    </template>
                                                </div>
                                                <div class="slds-col slds-no-flex slds-grid slds-grid_vertical-align-center slds-m-left_x-small">
                                                    <template lwc:if={appt.showCheckin}>
                                                        <lightning-button
                                                            label="Check In"
                                                            variant="neutral"
                                                            data-id={appt.id}
                                                            onclick={handleCheckin}>
                                                        </lightning-button>
                                                    </template>
                                                    <lightning-button-icon
                                                        class="lobby-appt__menu-btn"
                                                        icon-name="utility:down"
                                                        variant="border-filled"
                                                        alternative-text="Appointment actions"
                                                        title="Appointment actions"
                                                        data-id={appt.id}
                                                        onclick={handleApptMenu}>
                                                    </lightning-button-icon>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="lobby-appt__footer slds-p-horizontal_small slds-p-vertical_x-small">
                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                <div class="lobby-appt__footer-left slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate">
                                                    <lightning-icon
                                                        class="lobby-appt__clock-icon slds-m-right_xx-small"
                                                        icon-name="utility:event"
                                                        size="x-small"
                                                        alternative-text="">
                                                    </lightning-icon>
                                                    <span class="lobby-appt__slot slds-truncate">{appt.slot}</span>
                                                </div>
                                                <template lwc:if={appt.checkedIn}>
                                                    <span class="lobby-appt__checked-in-badge slds-m-left_x-small">{appt.checkedInLabel}</span>
                                                </template>
                                                <template lwc:if={appt.showWaitAlert}>
                                                    <div class="lobby-appt__wait slds-grid slds-grid_vertical-align-center slds-no-flex slds-m-left_x-small">
                                                        <lightning-icon
                                                            class={appt.waitClockClass}
                                                            icon-name="utility:clock"
                                                            size="x-small"
                                                            alternative-text="">
                                                        </lightning-icon>
                                                        <span class={appt.waitLabelClass}>{appt.waitLabel}</span>
                                                        <span class={appt.waitTimeClass}>{appt.waitTime}</span>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <div class="slds-m-top_large">
                                <div class="lobby-section__header slds-m-bottom_medium">
                                    <div class="lobby-section__label">Upcoming</div>
                                    <div class="lobby-section__meta slds-m-top_xx-small">{upcomingSectionMetaLine}</div>
                                </div>
                                <template for:each={upcomingAppointmentsView} for:item="appt">
                                    <div key={appt.id} class="lobby-appt slds-m-bottom_medium">
                                        <div class="lobby-appt__body slds-p-around_small">
                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                <div class="lobby-appt__identity">
                                                    <div
                                                        class="lobby-appt__name slds-truncate"
                                                        role="button"
                                                        tabindex="0"
                                                        title={appt.customerName}>
                                                        {appt.customerName}
                                                    </div>
                                                    <div class="lobby-appt__detail slds-m-top_xx-small slds-truncate" title={appt.subtitle}>
                                                        {appt.subtitle}
                                                    </div>
                                                    <template lwc:if={appt.serviceApptLabel}>
                                                        <div class="lobby-appt__detail slds-m-top_xx-small slds-truncate" title={appt.serviceApptLabel}>
                                                            {appt.serviceApptLabel}
                                                        </div>
                                                    </template>
                                                </div>
                                                <div class="slds-col slds-no-flex slds-grid slds-grid_vertical-align-center slds-m-left_x-small">
                                                    <template lwc:if={appt.showCheckin}>
                                                        <lightning-button
                                                            label="Check In"
                                                            variant="neutral"
                                                            data-id={appt.id}
                                                            onclick={handleCheckin}>
                                                        </lightning-button>
                                                    </template>
                                                    <lightning-button-icon
                                                        class="lobby-appt__menu-btn"
                                                        icon-name="utility:down"
                                                        variant="border-filled"
                                                        alternative-text="Appointment actions"
                                                        title="Appointment actions"
                                                        data-id={appt.id}
                                                        onclick={handleApptMenu}>
                                                    </lightning-button-icon>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="lobby-appt__footer slds-p-horizontal_small slds-p-vertical_x-small">
                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                <div class="lobby-appt__footer-left slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate">
                                                    <lightning-icon
                                                        class="lobby-appt__clock-icon slds-m-right_xx-small"
                                                        icon-name="utility:event"
                                                        size="x-small"
                                                        alternative-text="">
                                                    </lightning-icon>
                                                    <span class="lobby-appt__slot slds-truncate">{appt.slot}</span>
                                                </div>
                                                <template lwc:if={appt.checkedIn}>
                                                    <span class="lobby-appt__checked-in-badge slds-m-left_x-small">{appt.checkedInLabel}</span>
                                                </template>
                                                <template lwc:if={appt.showWaitAlert}>
                                                    <div class="lobby-appt__wait slds-grid slds-grid_vertical-align-center slds-no-flex slds-m-left_x-small">
                                                        <lightning-icon
                                                            class={appt.waitClockClass}
                                                            icon-name="utility:clock"
                                                            size="x-small"
                                                            alternative-text="">
                                                        </lightning-icon>
                                                        <span class={appt.waitLabelClass}>{appt.waitLabel}</span>
                                                        <span class={appt.waitTimeClass}>{appt.waitTime}</span>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </article>
                </lightning-layout-item>

                <lightning-layout-item size="12" large-device-size="4" padding="horizontal-small">
                    <article class="lobby-card slds-card">
                        <div class="slds-card__header slds-grid lobby-queue-card__header">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate slds-col">
                                <div class="slds-media__figure">
                                    <span class="lobby-queue-dot" aria-hidden="true"></span>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="lobby-queue-title">General Banking</h2>
                                    <p class="lobby-card__meta slds-m-top_xx-small">{generalQueueMetaLeft}</p>
                                    <p class="lobby-card__meta">{generalQueueMetaRight}</p>
                                </div>
                            </header>
                            <div class="slds-no-flex">
                                <lightning-button-group class="lobby-queue-button-group">
                                    <lightning-button
                                        label="Check In"
                                        variant="neutral"
                                        title="Check In"
                                        onclick={handleQueueCheckIn}>
                                    </lightning-button>
                                    <lightning-button-icon
                                        icon-name="utility:refresh"
                                        variant="border-filled"
                                        alternative-text="Refresh queue"
                                        title="Refresh"
                                        onclick={handleRefresh}>
                                    </lightning-button-icon>
                                </lightning-button-group>
                            </div>
                        </div>
                        <div class="lobby-card__separator-slot" aria-hidden="true">
                            <div class="lobby-card__separator-line"></div>
                        </div>
                        <div class="slds-card__body slds-card__body_inner lobby-card__body-queue">
                            <div class="lobby-queue-toolbar">
                                <a href="javascript:void(0);" class="lobby-expand-link" onclick={handleShowAllTopicsGeneral}>
                                    {expandLabelGeneral}
                                </a>
                            </div>
                            <lightning-accordion
                                class="lobby-queue-accordion"
                                allow-multiple-sections-open
                                active-section-name={generalBankingOpenSections}
                                onsectiontoggle={handleGeneralAccordionToggle}>
                                <template for:each={generalBankingTopics} for:item="topic">
                                    <lightning-accordion-section key={topic.id} name={topic.id} label={topic.label}>
                                        <template for:each={topic.participants} for:item="row">
                                            <div key={row.id} class="lobby-queue-participant slds-m-top_small">
                                                <div class="lobby-queue-participant__head slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                    <div class="lobby-queue-participant__identity">
                                                        <div class="lobby-queue-participant__title-row">
                                                            <span class="lobby-queue-participant__title slds-truncate">
                                                                <span
                                                                    class="lobby-queue-participant__link">{row.linkLabel}</span>
                                                            </span>
                                                        </div>
                                                        <div class="lobby-queue-participant__topic slds-truncate slds-m-top_xx-small">
                                                            {row.topic}
                                                        </div>
                                                    </div>
                                                    <div class="slds-no-flex slds-m-left_x-small lobby-queue-participant__actions">
                                                        <div class="lobby-row-menu-wrap">
                                                            <lightning-button-icon
                                                                icon-name="utility:down"
                                                                variant="border-filled"
                                                                alternative-text="Participant actions"
                                                                title="Participant actions"
                                                                data-id={row.id}
                                                                onclick={handleQueueParticipantMenu}>
                                                            </lightning-button-icon>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="lobby-appt__footer slds-p-horizontal_small slds-p-vertical_x-small">
                                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                        <div class="lobby-appt__footer-left slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate">
                                                            <lightning-icon
                                                                class="lobby-appt__clock-icon slds-m-right_xx-small"
                                                                icon-name="utility:event"
                                                                size="x-small"
                                                                alternative-text="">
                                                            </lightning-icon>
                                                            <span class="lobby-appt__slot slds-truncate">{row.slot}</span>
                                                        </div>
                                                        <span class="lobby-appt__checked-in-badge slds-m-left_x-small">Checked In</span>
                                                        <div class="lobby-appt__wait slds-grid slds-grid_vertical-align-center slds-no-flex slds-m-left_x-small">
                                                            <lightning-icon
                                                                class="lobby-appt__wait-clock slds-m-right_xx-small"
                                                                icon-name="utility:clock"
                                                                size="x-small"
                                                                alternative-text="">
                                                            </lightning-icon>
                                                            <span class="lobby-appt__wait-label">Wait Time:</span>
                                                            <span class="lobby-appt__wait-time slds-m-left_xx-small">{row.waitTime}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </lightning-accordion-section>
                                </template>
                            </lightning-accordion>

                        </div>

                        <template lwc:if={showCheckinComposer}>
                            <div class="lobby-checkin-overlay-scrim" onclick={handleCloseCheckinComposer}></div>
                            <div class="lobby-checkin-overlay">
                                <!-- Header -->
                                <div class="lobby-checkin-overlay__header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                        <span class="lobby-checkin-overlay__title">Check In Customer - General Banking</span>
                                    <button
                                        class="slds-button slds-button_icon lobby-checkin-overlay__close"
                                        title="Close"
                                        onclick={handleCloseCheckinComposer}>
                                        <lightning-icon icon-name="utility:close" size="x-small" alternative-text="Close"></lightning-icon>
                                    </button>
                                </div>
                                <!-- Body -->
                                <div class="lobby-checkin-overlay__body">
                                    <!-- Account Status -->
                                    <div class="lobby-checkin-field">
                                        <fieldset class="slds-form-element">
                                            <legend class="lobby-checkin-label">
                                                <abbr class="lobby-checkin-required" title="required">*</abbr> Account Status
                                            </legend>
                                            <div class="slds-form-element__control slds-m-top_xx-small">
                                                <div class="slds-grid slds-gutters_small">
                                                    <div class="slds-col">
                                                        <span class="slds-radio">
                                                            <input type="radio" id="ci-existing" name="ci-guest-type" value="existing" checked={ciIsExisting} onchange={handleCiGuestTypeChange} />
                                                            <label class="slds-radio__label" for="ci-existing">
                                                                <span class="slds-radio_faux"></span>
                                                                <span class="slds-form-element__label">Existing User</span>
                                                            </label>
                                                        </span>
                                                    </div>
                                                    <div class="slds-col">
                                                        <span class="slds-radio">
                                                            <input type="radio" id="ci-new" name="ci-guest-type" value="new" onchange={handleCiGuestTypeChange} />
                                                            <label class="slds-radio__label" for="ci-new">
                                                                <span class="slds-radio_faux"></span>
                                                                <span class="slds-form-element__label">Guest</span>
                                                            </label>
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </fieldset>
                                    </div>
                                    <!-- New Participant form -->
                                    <template lwc:if={ciIsNewParticipant}>
                                        <div class="lobby-checkin-field lobby-newp-grid">
                                            <div class="lobby-newp-col">
                                                <label class="lobby-checkin-label" for="ci-fname"><abbr class="lobby-checkin-required" title="required">*</abbr>First Name</label>
                                                <input id="ci-fname" type="text" class="lobby-newp-input" placeholder={ciFNamePh} value={ciFirstName} oninput={handleCiFirstNameChange} />
                                            </div>
                                            <div class="lobby-newp-col">
                                                <label class="lobby-checkin-label" for="ci-lname"><abbr class="lobby-checkin-required" title="required">*</abbr>Last Name</label>
                                                <input id="ci-lname" type="text" class="lobby-newp-input" placeholder={ciLNamePh} value={ciLastName} oninput={handleCiLastNameChange} />
                                            </div>
                                            <div class="lobby-newp-col">
                                                <label class="lobby-checkin-label" for="ci-contact"><abbr class="lobby-checkin-required" title="required">*</abbr>Contact Number</label>
                                                <input id="ci-contact" type="tel" class="lobby-newp-input" placeholder={ciContactPh} value={ciContact} oninput={handleCiContactChange} />
                                            </div>
                                            <div class="lobby-newp-col">
                                                <label class="lobby-checkin-label" for="ci-company">Company</label>
                                                <input id="ci-company" type="text" class="lobby-newp-input" placeholder={ciCompanyPh} value={ciCompany} oninput={handleCiCompanyChange} />
                                            </div>
                                        </div>
                                        <div class="lobby-checkin-field">
                                            <label class="lobby-checkin-label" for="ci-email"><abbr class="lobby-checkin-required" title="required">*</abbr>Email</label>
                                            <input id="ci-email" type="email" class="lobby-newp-input lobby-newp-input--full" placeholder={ciEmailPh} value={ciEmail} oninput={handleCiEmailChange} />
                                        </div>
                                    </template>
                                    <!-- Participant grouped combobox (existing) -->
                                    <template lwc:else>
                                    <div class="lobby-checkin-field lobby-participant-field">
                                        <label class="lobby-checkin-label">
                                            <abbr class="lobby-checkin-required" title="required">*</abbr> User
                                        </label>
                                        <div class="lobby-grouped-combobox">
                                            <!-- Type selector -->
                                            <div class="lobby-grouped-combobox__type-wrap">
                                                <button type="button"
                                                    class="lobby-grouped-combobox__type-btn"
                                                    onclick={handleParticipantTypeToggle}
                                                    onblur={handleParticipantTypeBlur}>
                                                    <span class="lobby-grouped-combobox__type-label">{selectedParticipantType}</span>
                                                    <lightning-icon icon-name="utility:down" size="x-small" alternative-text="Open"></lightning-icon>
                                                </button>
                                                <template lwc:if={showParticipantTypeDropdown}>
                                                    <div class="lobby-grouped-combobox__type-dropdown">
                                                        <ul role="listbox">
                                                            <template for:each={participantTypeOptions} for:item="opt">
                                                                <li key={opt.id}
                                                                    class="lobby-grouped-combobox__type-option"
                                                                    data-id={opt.id}
                                                                    role="option"
                                                                    onclick={handleParticipantTypeSelect}>
                                                                    <lightning-icon icon-name={opt.icon} size="small" alternative-text={opt.label}></lightning-icon>
                                                                    <span>{opt.label}</span>
                                                                </li>
                                                            </template>
                                                        </ul>
                                                    </div>
                                                </template>
                                            </div>
                                            <!-- Search field -->
                                            <div class="lobby-grouped-combobox__search-wrap">
                                                <input
                                                    type="text"
                                                    class="lobby-grouped-combobox__search-input"
                                                    placeholder="Search..."
                                                    value={participantSearch}
                                                    onfocus={handleParticipantFocus}
                                                    oninput={handleParticipantInput}
                                                    onblur={handleParticipantBlur} />
                                                <lightning-icon class="lobby-grouped-combobox__search-icon" icon-name="utility:search" size="x-small" alternative-text="Search"></lightning-icon>
                                                <template lwc:if={showParticipantDropdown}>
                                                    <div class="lobby-participant-combobox__dropdown">
                                                        <div class="lobby-participant-combobox__group-label">Recent Items</div>
                                                        <ul class="lobby-participant-combobox__list" role="listbox">
                                                            <template for:each={filteredParticipants} for:item="item">

                                                <!-- Right arm -->
                                                <rect x="110" y="96" width="14" height="8" rx="4" fill="#b8dff5"/>
                                                <rect x="116" y="88" width="8" height="20" rx="4" fill="#b8dff5"/>
                                                <!-- Small cactus left -->
                                                <rect x="58" y="106" width="8" height="22" rx="4" fill="#c8e8f8"/>
                                                <rect x="52" y="112" width="8" height="6" rx="3" fill="#c8e8f8"/>
                                                <!-- Small cactus right -->
                                                <rect x="152" y="110" width="7" height="18" rx="3.5" fill="#c8e8f8"/>
                                                <rect x="152" y="114" width="7" height="5" rx="2.5" fill="#c8e8f8"/>
                                                <!-- Mountains -->
                                                <polygon points="128,128 148,98 168,128" fill="none" stroke="#c8e8f8" stroke-width="2" stroke-linejoin="round"/>
                                                <polygon points="142,128 158,106 174,128" fill="none" stroke="#daeefa" stroke-width="1.5" stroke-linejoin="round"/>
                                            </svg>
                                        </div>
                                        <p class="lobby-empty-state__title">No participants found</p>
                                        <p class="lobby-empty-state__body">There aren&apos;t any participants added to this waitlist.</p>
                                    </div>
                                </template>
                            </div>

                            <!-- Check-in composer overlay -->
                            <template lwc:if={wl.showCheckinComposer}>
                                <div class="lobby-checkin-overlay-scrim" onclick={handleCloseDynCheckinComposer}></div>
                                <div class="lobby-checkin-overlay">
                                    <div class="lobby-checkin-overlay__header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                        <span class="lobby-checkin-overlay__title">Check In Customer - {wl.name}</span>
                                        <button
                                            class="slds-button slds-button_icon lobby-checkin-overlay__close"
                                            title="Close"
                                            onclick={handleCloseDynCheckinComposer}>
                                            <lightning-icon icon-name="utility:close" size="x-small" alternative-text="Close"></lightning-icon>
                                        </button>
                                    </div>
                                    <div class="lobby-checkin-overlay__body">
                                        <!-- Account Status -->
                                        <div class="lobby-checkin-field">
                                            <fieldset class="slds-form-element">
                                                <legend class="lobby-checkin-label">
                                                    <abbr class="lobby-checkin-required" title="required">*</abbr> Account Status
                                                </legend>
                                                <div class="slds-form-element__control slds-m-top_xx-small">
                                                    <div class="slds-grid slds-gutters_small">
                                                        <div class="slds-col">
                                                            <span class="slds-radio">
                                                                <input type="radio" id="dyn-ci-existing" name="dyn-ci-guest-type" value="existing" checked={dynCiIsExisting} onchange={handleDynCiGuestTypeChange} />
                                                                <label class="slds-radio__label" for="dyn-ci-existing">
                                                                    <span class="slds-radio_faux"></span>
                                                                    <span class="slds-form-element__label">Existing User</span>
                                                                </label>
                                                            </span>
                                                        </div>
                                                        <div class="slds-col">
                                                            <span class="slds-radio">
                                                                <input type="radio" id="dyn-ci-new" name="dyn-ci-guest-type" value="new" onchange={handleDynCiGuestTypeChange} />
                                                                <label class="slds-radio__label" for="dyn-ci-new">
                                                                    <span class="slds-radio_faux"></span>
                                                                    <span class="slds-form-element__label">Guest</span>
                                                                </label>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </fieldset>
                                        </div>
                                        <!-- New guest form -->
                                        <template lwc:if={dynCiIsNewParticipant}>
                                            <div class="lobby-checkin-field lobby-newp-grid">
                                                <div class="lobby-newp-col">
                                                    <label class="lobby-checkin-label" for="dyn-ci-fname"><abbr class="lobby-checkin-required" title="required">*</abbr>First Name</label>
                                                    <input id="dyn-ci-fname" type="text" class="lobby-newp-input" placeholder={dynCiFNamePh} value={dynCiFirstName} oninput={handleDynCiFirstNameChange} />
                                                </div>
                                                <div class="lobby-newp-col">
                                                    <label class="lobby-checkin-label" for="dyn-ci-lname"><abbr class="lobby-checkin-required" title="required">*</abbr>Last Name</label>
                                                    <input id="dyn-ci-lname" type="text" class="lobby-newp-input" placeholder={dynCiLNamePh} value={dynCiLastName} oninput={handleDynCiLastNameChange} />
                                                </div>
                                                <div class="lobby-newp-col">
                                                    <label class="lobby-checkin-label" for="dyn-ci-contact"><abbr class="lobby-checkin-required" title="required">*</abbr>Contact Number</label>
                                                    <input id="dyn-ci-contact" type="tel" class="lobby-newp-input" placeholder={dynCiContactPh} value={dynCiContact} oninput={handleDynCiContactChange} />
                                                </div>
                                                <div class="lobby-newp-col">
                                                    <label class="lobby-checkin-label" for="dyn-ci-company">Company</label>
                                                    <input id="dyn-ci-company" type="text" class="lobby-newp-input" placeholder={dynCiCompanyPh} value={dynCiCompany} oninput={handleDynCiCompanyChange} />
                                                </div>
                                            </div>
                                            <div class="lobby-checkin-field">
                                                <label class="lobby-checkin-label" for="dyn-ci-email"><abbr class="lobby-checkin-required" title="required">*</abbr>Email</label>
                                                <input id="dyn-ci-email" type="email" class="lobby-newp-input lobby-newp-input--full" placeholder={dynCiEmailPh} value={dynCiEmail} oninput={handleDynCiEmailChange} />
                                            </div>
                                        </template>
                                        <!-- Existing user search -->
                                        <template lwc:else>
                                            <div class="lobby-checkin-field lobby-participant-field">
                                                <label class="lobby-checkin-label">
                                                    <abbr class="lobby-checkin-required" title="required">*</abbr> User
                                                </label>
                                                <div class="lobby-grouped-combobox">
                                                    <div class="lobby-grouped-combobox__type-wrap">
                                                        <button type="button"
                                                            class="lobby-grouped-combobox__type-btn"
                                                            onclick={handleDynParticipantTypeToggle}
                                                            onblur={handleDynParticipantTypeBlur}>
                                                            <span class="lobby-grouped-combobox__type-label">{selectedDynParticipantType}</span>
                                                            <lightning-icon icon-name="utility:down" size="x-small" alternative-text="Open"></lightning-icon>
                                                        </button>
                                                        <template lwc:if={showDynParticipantTypeDropdown}>
                                                            <div class="lobby-grouped-combobox__type-dropdown">
                                                                <ul role="listbox">
                                                                    <template for:each={participantTypeOptions} for:item="opt">
                                                                        <li key={opt.id}
                                                                            class="lobby-grouped-combobox__type-option"
                                                                            data-id={opt.id}
                                                                            role="option"
                                                                            onclick={handleDynParticipantTypeSelect}>
                                                                            <lightning-icon icon-name={opt.icon} size="small" alternative-text={opt.label}></lightning-icon>
                                                                            <span>{opt.label}</span>
                                                                        </li>
                                                                    </template>
                                                                </ul>
                                                            </div>
                                                        </template>
                                                    </div>
                                                    <div class="lobby-grouped-combobox__search-wrap">
                                                        <input
                                                            type="text"
                                                            class="lobby-grouped-combobox__search-input"
                                                            placeholder="Search..."
                                                            value={dynParticipantSearch}
                                                            onfocus={handleDynParticipantFocus}
                                                            oninput={handleDynParticipantInput}
                                                            onblur={handleDynParticipantBlur} />
                                                        <lightning-icon class="lobby-grouped-combobox__search-icon" icon-name="utility:search" size="x-small" alternative-text="Search"></lightning-icon>
                                                        <template lwc:if={showDynParticipantDropdown}>
                                                            <div class="lobby-participant-combobox__dropdown">
                                                                <div class="lobby-participant-combobox__group-label">Recent Items</div>
                                                                <ul class="lobby-participant-combobox__list" role="listbox">
                                                                    <template for:each={filteredParticipantsDyn} for:item="item">
                                                                        <li key={item.id}
                                                                            class="lobby-participant-combobox__option"
                                                                            data-id={item.id}
                                                                            role="option"
                                                                            onclick={handleDynParticipantSelect}>
                                                                            <div class="lobby-participant-combobox__option-icon">
                                                                                <lightning-icon icon-name={item.icon} size="small" alternative-text="Account"></lightning-icon>
                                                                            </div>
                                                                            <div class="lobby-participant-combobox__option-text">
                                                                                <div class="lobby-participant-combobox__option-name">{item.label}</div>
                                                                                <template lwc:if={item.meta}>
                                                                                    <div class="lobby-participant-combobox__option-meta">{item.meta}</div>
                                                                                </template>
                                                                            </div>
                                                                        </li>
                                                                    </template>
                                                                </ul>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                        <!-- Work Topic -->
                                        <div class="lobby-checkin-field">
                                            <label class="lobby-checkin-label" for="dyn-ci-topic">
                                                <abbr class="lobby-checkin-required" title="required">*</abbr> Work Topic
                                            </label>
                                            <lightning-combobox
                                                id="dyn-ci-topic"
                                                label="Work Topic"
                                                variant="label-hidden"
                                                value={dynCiTopic}
                                                options={dynCheckinTopicOptions}
                                                onchange={handleDynCiTopicChange}>
                                            </lightning-combobox>
                                        </div>
                                        <!-- Description -->
                                        <div class="lobby-checkin-field">
                                            <label class="lobby-checkin-label" for="dyn-ci-desc">Description</label>
                                            <lightning-textarea
                                                id="dyn-ci-desc"
                                                label="Description"
                                                variant="label-hidden"
                                                value={dynCiDesc}
                                                placeholder={dynCiDescPh}
                                                max-length="500"
                                                onchange={handleDynCiDescChange}>
                                            </lightning-textarea>
                                        </div>
                                        <!-- Preferred Resource -->
                                        <div class="lobby-checkin-field">
                                            <label class="lobby-checkin-label" for="dyn-ci-resource">Preferred Resource</label>
                                            <lightning-combobox
                                                id="dyn-ci-resource"
                                                label="Preferred Resource"
                                                variant="label-hidden"
                                                value={dynCiResource}
                                                options={checkinResourceOptions}
                                                onchange={handleDynCiResourceChange}>
                                            </lightning-combobox>
                                        </div>
                                    </div>
                                    <div class="lobby-checkin-overlay__footer">
                                        <lightning-button
                                            label="Check In"
                                            variant="brand"
                                            onclick={handleSubmitCheckinComposerDyn}>
                                        </lightning-button>
                                    </div>
                                </div>
                            </template>
                        </article>
                    </lightning-layout-item>
                </template>

            </lightning-layout>
        </div>

        <!-- Global appointment action dropdown portal -->
        <template lwc:if={activeApptMenuId}>
            <div class="lobby-row-menu__dropdown" style={apptMenuDropdownStyle}>
                <ul role="menu">
                    <li role="menuitem" class="lobby-row-menu__item" data-id={activeApptMenuId} onclick={handleApptReschedule}>Reschedule Service Appointment</li>
                    <li role="menuitem" class="lobby-row-menu__item" data-id={activeApptMenuId} onclick={handleApptReassign}>Reassign Service Resource</li>
                    <li role="menuitem" class="lobby-row-menu__item" data-id={activeApptMenuId} onclick={handleApptNoShow}>Mark as No Show</li>
                </ul>
            </div>
        </template>

        <!-- Global participant action dropdown portal — rendered last so it always paints on top -->
        <template lwc:if={activeMenuRowId}>
            <div class="lobby-row-menu__dropdown" style={menuDropdownStyle}>
                <ul role="menu">
                    <li role="menuitem" class="lobby-row-menu__item" data-action="first" data-id={activeMenuRowId} onclick={handleParticipantActionRequest}>Move to first in the waitlist</li>
                    <li role="menuitem" class="lobby-row-menu__item" data-action="last"  data-id={activeMenuRowId} onclick={handleParticipantActionRequest}>Move to last in the waitlist</li>
                    <li role="menuitem" class="lobby-row-menu__item" data-id={activeMenuRowId} onclick={handleParticipantNoShow}>Mark as No-Show</li>
                    <li role="menuitem" class="lobby-row-menu__item" data-id={activeMenuRowId} onclick={handleParticipantRemoveResource}>Remove Preferred Resource</li>
                </ul>
            </div>
        </template>

        <!-- Reschedule Appointment modal -->
        <template lwc:if={showRescheduleModal}>
            <div class="lobby-modal-backdrop"></div>
            <div class="rsched-modal-container">
                <button class="lobby-modal__close rsched-close" onclick={handleRescheduleClose} aria-label="Close">
                    <lightning-icon icon-name="utility:close" size="small" style="--slds-c-icon-color-foreground: #0176d3;"></lightning-icon>
                </button>
                <div class="rsched-modal" role="dialog" aria-modal="true" aria-labelledby="rschedTitle">
                    <div class="rsched-modal__header">
                        <h2 id="rschedTitle" class="rsched-modal__title">Schedule Appointment</h2>
                    </div>
                    <div class="rsched-modal__body">
                        <!-- Left sidebar -->
                        <div class="rsched-sidebar">
                            <ul class="rsched-sidebar__nav">
                                <li class={rschedTabAvailableClass} onclick={handleRschedTabAvailable}>
                                    <lightning-icon icon-name="utility:date_time" size="x-small"></lightning-icon>
                                    <span>By Available Slots</span>
                                </li>
                                <li class={rschedTabResourceClass} onclick={handleRschedTabResource}>
                                    <lightning-icon icon-name="utility:people" size="x-small"></lightning-icon>
                                    <span>By Required Resources</span>
                                </li>
                            </ul>
                        </div>

                        <!-- Middle calendar panel -->
                        <div class="rsched-cal-panel">
                            <div class="rsched-cal__card">
                            <div class="rsched-cal__nav">
                                <button class="rsched-cal__arrow" onclick={handleCalPrev} aria-label="Previous month">
                                    <lightning-icon icon-name="utility:chevronleft" size="x-small"></lightning-icon>
                                </button>
                                <span class="rsched-cal__month">{calMonthLabel}</span>
                                <button class="rsched-cal__arrow" onclick={handleCalNext} aria-label="Next month">
                                    <lightning-icon icon-name="utility:chevronright" size="x-small"></lightning-icon>
                                </button>
                                <div class="rsched-cal__year-wrap">
                                    <select class="rsched-cal__year-select" onchange={handleCalYearChange}>
                                        <template for:each={calYearOptions} for:item="yr">
                                            <option key={yr.value} value={yr.value} selected={yr.selected}>{yr.label}</option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                            <table class="rsched-cal__grid" aria-label="Calendar">
                                <thead>
                                    <tr>
                                        <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={calWeeks} for:item="week">
                                        <tr key={week.key}>
                                            <template for:each={week.days} for:item="day">
                                                <td key={day.key}
                                                    class={day.cls}
                                                    data-date={day.dateStr}
                                                    onclick={handleCalDayClick}>
                                                    <span>{day.label}</span>
                                                </td>
                                            </template>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                            <div class="rsched-cal__today-wrap">
                                <button class="rsched-cal__today-btn" onclick={handleCalToday}>Today</button>
                            </div>
                            </div><!-- end rsched-cal__card -->
                            <div class="rsched-info-banner">
                                <lightning-icon icon-name="utility:info_alt" size="small"></lightning-icon>
                                <span>Service resource will be assigned based on availability for the preferred slot.</span>
                            </div>
                        </div>

                        <!-- Right slots panel -->
                        <div class="rsched-slots-panel">
                            <p class="rsched-slots__date-label">{calSelectedDateLabel}</p>
                            <ul class="rsched-slots__list">
                                <template for:each={calTimeSlots} for:item="slot">
                                    <li key={slot.id} class={slot.cls} data-id={slot.id} onclick={handleSlotSelect}>
                                        <div class="rsched-slot__icon-cell">
                                            <lightning-icon icon-name="utility:event" size="x-small"></lightning-icon>
                                        </div>
                                        <span class="rsched-slot__time">{slot.time}</span>
                                        <span class={slot.badgeCls}>{slot.capacity}</span>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </div>
                    <div class="rsched-modal__footer">
                        <lightning-button label="Cancel" onclick={handleRescheduleClose}></lightning-button>
                        <div class="rsched-footer__right">
                            <lightning-button label="Previous" onclick={handleRescheduleClose}></lightning-button>
                            <lightning-button label="Reschedule" variant="brand" onclick={handleRescheduleConfirm}></lightning-button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Waitlist Repositioning confirmation modal -->
        <template lwc:if={showRepoConfirm}>
            <div class="lobby-modal-backdrop"></div>
            <div class="lobby-modal-container">
                <div class="lobby-modal" role="dialog" aria-modal="true" aria-labelledby="repoModalTitle">
                    <div class="lobby-modal__header">
                        <h2 id="repoModalTitle" class="lobby-modal__title">Waitlist Repositioning</h2>
                    </div>
                    <div class="lobby-modal__body">
                        <p>{repoConfirmMessage}</p>
                    </div>
                    <div class="lobby-modal__footer">
                        <lightning-button label="Cancel"  onclick={handleRepoConfirmNo}></lightning-button>
                        <lightning-button label="Confirm" variant="brand" onclick={handleRepoConfirmYes}></lightning-button>
                    </div>
                </div>
                <button class="lobby-modal__close" onclick={handleRepoConfirmNo} aria-label="Close">
                    <lightning-icon icon-name="utility:close" size="small" style="--slds-c-icon-color-foreground: #0176d3;"></lightning-icon>
                </button>
            </div>
        </template>
    </div>
</template>
