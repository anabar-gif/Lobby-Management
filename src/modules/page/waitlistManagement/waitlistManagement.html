<template>
    <div class="wl-root">

        <!-- Page Header -->
        <div class="wl-page-header">
            <div class="wl-page-header__eyebrow">Waitlists</div>
            <div class="slds-grid slds-grid_vertical-align-center">
                <div class="slds-grid slds-grid_vertical-align-center slds-col">
                    <lightning-icon
                        icon-name="standard:queue"
                        size="small"
                        class="slds-m-right_x-small"
                        alternative-text="Waitlists">
                    </lightning-icon>
                    <h1 class="wl-page-header__title slds-m-right_xx-small">{currentView}</h1>
                    <div class="wl-view-trigger-wrap">
                        <button
                            class="wl-view-trigger"
                            aria-haspopup="listbox"
                            aria-expanded={viewDropdownOpen}
                            onclick={handleViewTrigger}
                            title="Switch list view">
                            <lightning-icon icon-name="utility:down" size="xx-small" alternative-text=""></lightning-icon>
                        </button>
                        <template lwc:if={viewDropdownOpen}>
                            <div class="wl-view-dropdown" role="listbox">
                                <div class="wl-view-dropdown__search-wrap">
                                    <lightning-icon icon-name="utility:search" size="x-small" class="wl-view-dropdown__search-icon" alternative-text=""></lightning-icon>
                                    <input
                                        class="wl-view-dropdown__search-input"
                                        type="text"
                                        placeholder="Search lists..."
                                        value={viewSearch}
                                        oninput={handleViewSearch} />
                                </div>
                                <div class="wl-view-dropdown__section-label">Recent List Views</div>
                                <template for:each={recentListViews} for:item="v">
                                    <button key={v.value} class={v.itemClass} role="option" data-value={v.value} onclick={handleViewSelect}>
                                        <template lwc:if={v.selected}>
                                            <lightning-icon icon-name="utility:check" size="xx-small" class="wl-view-dropdown__check" alternative-text="Selected"></lightning-icon>
                                        </template>
                                        <template lwc:else>
                                            <span class="wl-view-dropdown__check-spacer"></span>
                                        </template>
                                        {v.label}
                                    </button>
                                </template>
                                <div class="wl-view-dropdown__section-label">All Other Lists</div>
                                <template for:each={otherListViews} for:item="v">
                                    <button key={v.value} class={v.itemClass} role="option" data-value={v.value} onclick={handleViewSelect}>
                                        <template lwc:if={v.selected}>
                                            <lightning-icon icon-name="utility:check" size="xx-small" class="wl-view-dropdown__check" alternative-text="Selected"></lightning-icon>
                                        </template>
                                        <template lwc:else>
                                            <span class="wl-view-dropdown__check-spacer"></span>
                                        </template>
                                        {v.label}
                                    </button>
                                </template>
                            </div>
                        </template>
                    </div>
                    <lightning-button-icon
                        icon-name="utility:pinned"
                        variant="bare"
                        size="small"
                        alternative-text="Pin list"
                        class="slds-m-left_xx-small">
                    </lightning-button-icon>
                </div>
                <div class="slds-col slds-no-flex">
                    <lightning-button label="New" variant="neutral" onclick={handleNew}></lightning-button>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="wl-toolbar">
            <span class="wl-toolbar__meta-text">{metaLine}</span>
            <div class="wl-toolbar__right">
                <div class="wl-toolbar__search">
                    <lightning-input
                        type="search"
                        label="Search this list..."
                        variant="label-hidden"
                        placeholder="Search this list..."
                        value={searchTerm}
                        onchange={handleSearch}>
                    </lightning-input>
                </div>
                <div class="wl-toolbar__icons">
                    <lightning-button-icon icon-name="utility:settings"   variant="border-filled" alternative-text="Settings"        size="small"></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:table"      variant="border-filled" alternative-text="Table view"      size="small"></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:kanban"     variant="border-filled" alternative-text="Kanban view"     size="small"></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:refresh"    variant="border-filled" alternative-text="Refresh"         size="small"></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:edit"       variant="border-filled" alternative-text="Edit columns"    size="small"></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:filterList" variant="border-filled" alternative-text="Filter"          size="small"></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:rows"       variant="border-filled" alternative-text="Column settings" size="small"></lightning-button-icon>
                </div>
            </div>
        </div>

        <!-- Datatable -->
        <div class="wl-table-container">
            <lightning-datatable
                key-field="id"
                data={filteredRows}
                columns={columns}
                onrowaction={handleRowAction}>
            </lightning-datatable>
        </div>

    </div>

    <!-- ── Slide-in Creator Panel ─────────────────────────────── -->
    <template lwc:if={showCreator}>

        <!-- Scrim (click to close) -->
        <div class="wl-creator-scrim" onclick={handleCreatorCancel}></div>

        <!-- Panel -->
        <div class={creatorPanelClass} role="dialog" aria-modal="true" aria-labelledby="creatorTitle">

            <!-- Header -->
            <div class="wl-creator__header">
                <h2 id="creatorTitle" class="wl-creator__title">Create Waitlist</h2>
                <button class="wl-creator__close" onclick={handleCreatorCancel} aria-label="Close">
                    <lightning-icon icon-name="utility:close" size="small" style="--slds-c-icon-color-foreground: #0176D3; --slds-c-icon-color-foreground-default: #0176D3;"></lightning-icon>
                </button>
            </div>

            <!-- Scrollable body -->
            <div class="wl-creator__body">

                <!-- Waitlist Name -->
                <div class="wl-creator__field-group">
                    <label class="wl-creator__label wl-creator__label--required" for="cr-name">Waitlist Name</label>
                    <input
                        id="cr-name"
                        class={nameInputClass}
                        type="text"
                        placeholder="e.g. General Banking"
                        value={creator.name}
                        oninput={handleCreatorName} />
                    <template lwc:if={nameError}>
                        <p class="wl-creator__error">Waitlist Name is required.</p>
                    </template>
                </div>

                <!-- Service Territory -->
                <div class="wl-creator__field-group">
                    <label class="wl-creator__label wl-creator__label--required" for="cr-territory">Service Territory</label>
                    <div class="wl-creator__territory-wrap">
                        <input
                            id="cr-territory"
                            class={territoryInputClass}
                            type="text"
                            placeholder="Search territories..."
                            value={creator.territorySearch}
                            oninput={handleTerritorySearch}
                            onfocus={handleTerritoryFocus}
                            onblur={handleTerritoryBlur}
                            autocomplete="off" />
                        <lightning-icon icon-name="utility:search" size="x-small" class="wl-creator__territory-icon" alternative-text=""></lightning-icon>
                        <template lwc:if={showTerritoryDropdown}>
                            <div class="wl-creator__territory-dropdown">
                                <div class="wl-creator__territory-section">Recent Items</div>
                                <template for:each={filteredTerritories} for:item="t">
                                    <button
                                        key={t.value}
                                        class="wl-creator__territory-item"
                                        data-value={t.value}
                                        data-label={t.label}
                                        onclick={handleTerritorySelect}>
                                        <lightning-icon icon-name="standard:service_territory" size="x-small" class="wl-creator__territory-item-icon" alternative-text=""></lightning-icon>
                                        <span class="wl-creator__territory-item-text">
                                            <span class="wl-creator__territory-item-name">{t.label}</span>
                                            <span class="wl-creator__territory-item-meta">{t.meta}</span>
                                        </span>
                                    </button>
                                </template>
                                <template lwc:if={noTerritoryResults}>
                                    <div class="wl-creator__territory-empty">No matches found.</div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <template lwc:if={territoryError}>
                        <p class="wl-creator__error">Service Territory is required.</p>
                    </template>
                </div>

                <!-- Description -->
                <div class="wl-creator__field-group">
                    <label class="wl-creator__label" for="cr-desc">Description</label>
                    <textarea
                        id="cr-desc"
                        class="wl-creator__textarea"
                        placeholder="Optional description..."
                        value={creator.description}
                        oninput={handleCreatorDesc}
                        rows="3">
                    </textarea>
                </div>

                <!-- Work Types -->
                <div class="wl-creator__field-group">
                    <label class="wl-creator__label wl-creator__label--required">Work Type</label>
                    <div class={wtSearchWrapClass} data-field="worktype" onclick={handleSearchWrapClick}>
                        <div class="wl-creator__search-input-row">
                            <lightning-icon icon-name="utility:search" size="x-small" class="wl-creator__search-icon" alternative-text="Search"></lightning-icon>
                            <input
                                type="text"
                                class="wl-creator__search-input"
                                placeholder="All work types"
                                value={wtSearch}
                                oninput={handleWtSearch}
                                onfocus={handleWtFocus}
                                autocomplete="off" />
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="wl-creator__search-chevron" alternative-text=""></lightning-icon>
                        </div>
                        <template lwc:if={showWorkTypeDropdown}>
                            <div class="wl-creator__search-dropdown">
                                <template lwc:if={hasRecentWorkTypes}>
                                    <div class="wl-creator__search-group-header">Recently Scheduled</div>
                                    <template for:each={recentWorkTypes} for:item="wt">
                                        <button key={wt.value} class="wl-creator__search-option" data-value={wt.value} data-label={wt.label} onclick={handleAddWorkType}>{wt.label}</button>
                                    </template>
                                </template>
                                <div class="wl-creator__search-group-header">All Work Types</div>
                                <template for:each={filteredWorkTypes} for:item="wt">
                                    <button key={wt.value} class="wl-creator__search-option" data-value={wt.value} data-label={wt.label} onclick={handleAddWorkType}>{wt.label}</button>
                                </template>
                                <template lwc:if={noFilteredWorkTypes}>
                                    <div class="wl-creator__search-option wl-creator__search-option--empty">No work types found</div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <template lwc:if={hasWorkTypes}>
                        <div class="wl-creator__chip-list">
                            <template for:each={creator.workTypes} for:item="wt">
                                <span key={wt.value} class="wl-creator__chip">
                                    <lightning-icon icon-name="utility:work_order" size="xx-small" class="wl-creator__chip-icon" alternative-text=""></lightning-icon>
                                    {wt.label}
                                    <button class="wl-creator__chip-remove" data-value={wt.value} onclick={handleRemoveWorkType} aria-label="Remove">
                                        <lightning-icon icon-name="utility:close" size="xx-small" alternative-text="Remove"></lightning-icon>
                                    </button>
                                </span>
                            </template>
                        </div>
                    </template>
                    <template lwc:if={workTypeError}>
                        <p class="wl-creator__error">Work Type is required.</p>
                    </template>
                </div>

                <!-- Service Resources -->
                <div class="wl-creator__field-group">
                    <label class="wl-creator__label wl-creator__label--required">Service Resources</label>
                    <div class={resSearchWrapClass} data-field="resource" onclick={handleSearchWrapClick}>
                        <div class="wl-creator__search-input-row">
                            <lightning-icon icon-name="utility:search" size="x-small" class="wl-creator__search-icon" alternative-text="Search"></lightning-icon>
                            <input
                                type="text"
                                class="wl-creator__search-input"
                                placeholder="All resources"
                                value={resSearch}
                                oninput={handleResSearch}
                                onfocus={handleResFocus}
                                autocomplete="off" />
                            <lightning-icon icon-name="utility:chevrondown" size="x-small" class="wl-creator__search-chevron" alternative-text=""></lightning-icon>
                        </div>
                        <template lwc:if={showResourceDropdown}>
                            <div class="wl-creator__search-dropdown">
                                <template lwc:if={hasRecentResources}>
                                    <div class="wl-creator__search-group-header">Recently Used</div>
                                    <template for:each={recentResources} for:item="r">
                                        <button key={r.value} class="wl-creator__search-option" data-value={r.value} data-label={r.label} onclick={handleAddResource}>
                                            <lightning-icon icon-name="standard:service_resource" size="x-small" class="wl-creator__search-option-icon" alternative-text=""></lightning-icon>
                                            {r.label}
                                        </button>
                                    </template>
                                </template>
                                <div class="wl-creator__search-group-header">All Resources</div>
                                <template for:each={filteredResources} for:item="r">
                                    <button key={r.value} class="wl-creator__search-option" data-value={r.value} data-label={r.label} onclick={handleAddResource}>
                                        <lightning-icon icon-name="standard:service_resource" size="x-small" class="wl-creator__search-option-icon" alternative-text=""></lightning-icon>
                                        {r.label}
                                    </button>
                                </template>
                                <template lwc:if={noFilteredResources}>
                                    <div class="wl-creator__search-option wl-creator__search-option--empty">No resources found</div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <template lwc:if={hasResources}>
                        <div class="wl-creator__chip-list">
                            <template for:each={creator.resources} for:item="r">
                                <span key={r.value} class="wl-creator__chip wl-creator__chip--resource">
                                    <lightning-icon icon-name="standard:service_resource" size="xx-small" class="wl-creator__chip-icon" alternative-text=""></lightning-icon>
                                    {r.label}
                                    <button class="wl-creator__chip-remove" data-value={r.value} onclick={handleRemoveResource} aria-label="Remove">
                                        <lightning-icon icon-name="utility:close" size="xx-small" alternative-text="Remove"></lightning-icon>
                                    </button>
                                </span>
                            </template>
                        </div>
                    </template>
                    <template lwc:if={resourceError}>
                        <p class="wl-creator__error">Service Resources is required.</p>
                    </template>
                </div>

                <!-- Toggles -->
                <div class="wl-creator__field-group wl-creator__field-group--toggles">
                    <div class="wl-creator__toggle-row">
                        <div class="wl-creator__toggle-info">
                            <span class="wl-creator__toggle-label">Active</span>
                            <span class="wl-creator__toggle-desc">Waitlist is live and accepting participants</span>
                        </div>
                        <button
                            class={activeToggleClass}
                            role="switch"
                            aria-checked={creator.active}
                            onclick={handleToggleActive}
                            title="Toggle Active">
                            <span class="wl-creator__toggle-knob"></span>
                        </button>
                    </div>
                    <div class="wl-creator__toggle-row">
                        <div class="wl-creator__toggle-info">
                            <span class="wl-creator__toggle-label">Enable Self Check-In</span>
                            <span class="wl-creator__toggle-desc">Customers can check in via public link</span>
                        </div>
                        <button
                            class={selfCheckinToggleClass}
                            role="switch"
                            aria-checked={creator.selfCheckin}
                            onclick={handleToggleSelfCheckin}
                            title="Toggle Self Check-In">
                            <span class="wl-creator__toggle-knob"></span>
                        </button>
                    </div>
                </div>

            </div><!-- /body -->

            <!-- Footer -->
            <div class="wl-creator__footer">
                <lightning-button label="Cancel" variant="neutral" onclick={handleCreatorCancel}></lightning-button>
                <lightning-button label="Create Waitlist" variant="brand" onclick={handleCreatorSave}></lightning-button>
            </div>

        </div><!-- /panel -->

    </template>
</template>
