<template>
    <div class={rootClass}>

        <!-- ── Header ── -->
        <header class="lm2-header">
            <div class="lm2-header__inner slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <div class="lm2-header__left slds-grid slds-grid_vertical-align-center">
                    <lightning-button-menu
                        class="lm2-header__branch-menu"
                        label={selectedBranch}
                        variant="bare"
                        menu-alignment="left"
                        alternative-text="Change branch"
                        onselect={handleBranchSelect}>
                        <lightning-menu-item label="Business District 2"        value="Business District 2"></lightning-menu-item>
                        <lightning-menu-item label="High Street 1"              value="High Street 1"></lightning-menu-item>
                        <lightning-menu-item label="Market St Branch"           value="Market St Branch"></lightning-menu-item>
                        <lightning-menu-item label="Mission St branch"          value="Mission St branch"></lightning-menu-item>
                        <lightning-menu-item label="Scheduler DF Moscone South" value="Scheduler DF Moscone South"></lightning-menu-item>
                        <lightning-menu-item label="Scheduler DF Tower"         value="Scheduler DF Tower"></lightning-menu-item>
                        <lightning-menu-item label="Virtual Retail Banking"     value="Virtual Retail Banking"></lightning-menu-item>
                        <lightning-menu-item label="Virtual Territory"          value="Virtual Territory"></lightning-menu-item>
                        <lightning-menu-item label="Virtual_Test"               value="Virtual_Test"></lightning-menu-item>
                    </lightning-button-menu>
                    <span class="lm2-header__sep" aria-hidden="true">|</span>
                    <span class="lm2-header__date">{todayLabel}</span>
                </div>
                <div class="lm2-toolbar slds-grid slds-grid_vertical-align-center">
                    <lightning-button-icon
                        class="lm2-toolbar__btn"
                        icon-name="utility:refresh"
                        variant="border-filled"
                        alternative-text="Refresh"
                        title="Refresh"
                        onclick={handleRefresh}>
                    </lightning-button-icon>
                    <lightning-button-icon
                        class="lm2-toolbar__btn"
                        icon-name="utility:chart"
                        variant="border-filled"
                        alternative-text="Peak Hours"
                        title="Peak Hours Chart"
                        onclick={handleTogglePeakChart}>
                    </lightning-button-icon>
                    <lightning-button-icon
                        class="lm2-toolbar__btn"
                        icon-name="utility:summary"
                        variant="border-filled"
                        alternative-text="Daily Summary"
                        title="Daily Summary"
                        onclick={handleToggleDailySummary}>
                    </lightning-button-icon>
                    <lightning-button-icon
                        class="lm2-toolbar__btn"
                        icon-name="utility:download"
                        variant="border-filled"
                        alternative-text="Export CSV"
                        title="Export to CSV"
                        onclick={handleExport}>
                    </lightning-button-icon>
                </div>
            </div>
        </header>

        <!-- ── KPI Stats Bar ── -->
        <div class="lm2-stats-bar">
            <div class="lm2-stats-bar__grid">

                <div class={tileFilterClassCheckedIn}
                     data-filter="checkedin"
                     onclick={handleTileClick}
                     role="button"
                     tabindex="0"
                     title="Click to show all checked-in participants">
                    <div class="lm2-stat-tile__accent lm2-stat-tile__accent--blue"></div>
                    <div class="lm2-stat-tile__value">{metricTotalCheckedIn}</div>
                    <div class="lm2-stat-tile__label">Total Checked In</div>
                </div>

                <div class={tileFilterClassServed}
                     data-filter="served"
                     onclick={handleTileClick}
                     role="button"
                     tabindex="0"
                     title="Click to show participants currently being served">
                    <div class="lm2-stat-tile__accent lm2-stat-tile__accent--green"></div>
                    <div class="lm2-stat-tile__value">{metricCurrentlyServed}</div>
                    <div class="lm2-stat-tile__label">Currently Served</div>
                </div>

                <div class={tileFilterClassAvgWait}
                     data-filter="avgwait"
                     onclick={handleTileClick}
                     role="button"
                     tabindex="0"
                     title="Click to show participants waiting above average">
                    <div class="lm2-stat-tile__accent lm2-stat-tile__accent--orange"></div>
                    <div class="lm2-stat-tile__value lm2-stat-tile__value--sm">{metricAvgWait}</div>
                    <div class="lm2-stat-tile__label">Avg Wait Time</div>
                </div>

                <div class={tileFilterClassVip}
                     data-filter="vip"
                     onclick={handleTileClick}
                     role="button"
                     tabindex="0"
                     title="Click to show only VIP participants">
                    <div class="lm2-stat-tile__accent lm2-stat-tile__accent--indigo"></div>
                    <div class="lm2-stat-tile__value">{metricVipCount}</div>
                    <div class="lm2-stat-tile__label">VIP Participants</div>
                </div>

                <div class={tileFilterClassOverdue}
                     data-filter="overdue"
                     onclick={handleTileClick}
                     role="button"
                     tabindex="0"
                     title="Click to show only overdue participants">
                    <div class="lm2-stat-tile__accent lm2-stat-tile__accent--red"></div>
                    <div class="lm2-stat-tile__value lm2-stat-tile__value--red lm2-stat-tile__value--overdue">
                        <span class="lm2-overdue-icon" role="img" aria-label="Warning: overdue participants">⚠</span>
                        {metricOverdueCount}
                    </div>
                    <div class="lm2-stat-tile__label">Overdue (&gt;45 min)</div>
                </div>

                <div class={tileFilterClassAvgService}
                     data-filter="avgservice"
                     onclick={handleTileClick}
                     role="button"
                     tabindex="0"
                     title="Click to show participants by service time">
                    <div class="lm2-stat-tile__accent lm2-stat-tile__accent--orange"></div>
                    <div class="lm2-stat-tile__value lm2-stat-tile__value--sm">{metricAvgServiceTime}</div>
                    <div class="lm2-stat-tile__label">Avg Service Time</div>
                </div>

            </div>
        </div>

        <!-- ── Search + Filters Bar ── -->
        <div class="lm2-search-bar">
            <lightning-input
                type="search"
                label="Search"
                variant="label-hidden"
                placeholder="Search participants across all queues…"
                value={globalSearch}
                onchange={handleGlobalSearchChange}
                class="lm2-search-input">
            </lightning-input>
            <div class="lm2-search-bar__filters">
                <div class="lm2-filter-group">
                    <span class="lm2-filter-label">Show Waitlists</span>
                    <lightning-combobox
                        name="waitlistFilter"
                        label="Waitlist filter"
                        variant="label-hidden"
                        value={selectedWaitlistFilter}
                        placeholder="All waitlists"
                        options={waitlistFilterOptions}
                        onchange={handleWaitlistFilterChange}>
                    </lightning-combobox>
                </div>
                <div class="lm2-filter-group">
                    <span class="lm2-filter-label">Resource</span>
                    <lightning-combobox
                        name="resourceFilter"
                        label="Resource filter"
                        variant="label-hidden"
                        value={filterByResource}
                        placeholder="All Resources"
                        options={resourceFilterOptions}
                        onchange={handleResourceFilterChange}>
                    </lightning-combobox>
                </div>
            </div>
        </div>

        <!-- ── Main 3-Column Layout ── -->
        <div class="lm2-main">
            <div class="lm2-layout">

                <!-- ── Column 1: Scheduled Appointments ── -->
                <div class="lm2-col">
                    <div class="lm2-col-header">
                        <lightning-icon icon-name="utility:event" size="xx-small" alternative-text=""></lightning-icon>
                        <span>Scheduled Appointments</span>
                    </div>
                    <article class="lm2-card lm2-card--scheduled">
                        <div class="lm2-card__header slds-grid">
                            <header class="slds-col slds-has-flexi-truncate">
                                <h2 class="lm2-card__title slds-truncate" title="Appointments">Appointments</h2>
                                <p class="lm2-card__meta">{metaLinePrimary}</p>
                                <p class="lm2-card__meta">{metaLineSecondary}</p>
                            </header>
                            <div class="slds-no-flex">
                                <lightning-button-icon
                                    icon-name="utility:refresh"
                                    variant="border-filled"
                                    alternative-text="Refresh"
                                    title="Refresh"
                                    onclick={handleRefresh}>
                                </lightning-button-icon>
                            </div>
                        </div>
                        <div class="lm2-card__body lm2-card__body--queue">

                            <lightning-accordion
                                class="lm2-queue-accordion"
                                allow-multiple-sections-open
                                active-section-name={apptOpenSections}
                                onsectiontoggle={handleApptAccordionToggle}>

                                <!-- Current section -->
                                <lightning-accordion-section name="current" label={currentSectionLabel}>
                                    <div class="lm2-accordion-content lm2-accordion-content--current-appt">
                                    <template for:each={currentAppointmentsFiltered} for:item="appt">
                                        <div key={appt.id} class="lm2-appt-card">
                                            <div class="lm2-appt-card__body">
                                                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                    <div class="lm2-appt-card__identity">
                                                        <div class="lm2-participant__name-row">
                                                            <a class="lm2-participant__name-link" href="#" onclick={handleApptBadgeClick} data-id={appt.id}>{appt.customerName}</a>
                                                            <span class="lm2-participant__name-sep">|</span>
                                                            <a class="lm2-participant__number-link" href="#" onclick={handleApptBadgeClick} data-id={appt.id}>{appt.appointmentNumber}</a>
                                                        </div>
                                                        <template lwc:if={appt.phone}>
                                                            <div class="lm2-participant__contact">📞 {appt.phone}</div>
                                                        </template>
                                                        <template lwc:if={appt.email}>
                                                            <div class="lm2-participant__contact">
                                                                <lightning-icon icon-name="utility:email" size="xx-small" alternative-text="Email"></lightning-icon> {appt.email}
                                                            </div>
                                                        </template>
                                                        <div class="lm2-appt-card__detail slds-truncate"><span>{appt.subtitle}</span><template lwc:if={appt.slot}><span class="lm2-appt-card__detail-sep"> • </span><span>{appt.slot}</span></template></div>
                                                    </div>
                                                    <div class="slds-no-flex lm2-appt-card__actions slds-grid slds-grid_vertical-align-center slds-m-left_x-small">
                                                        <template lwc:if={appt.showCheckin}>
                                                            <lightning-button label="Check In" variant="neutral" data-id={appt.id} onclick={handleCheckin}></lightning-button>
                                                        </template>
                                                        <lightning-button-icon icon-name="utility:down" variant="border-filled" alternative-text="Appointment actions" title="Appointment actions" data-id={appt.id} onclick={handleApptMenu}></lightning-button-icon>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="lm2-appt-card__footer">
                                                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                    <template lwc:if={appt.checkedIn}>
                                                        <span class="lm2-badge lm2-badge--checkedin">Check In: {appt.slotStart}</span>
                                                    </template>
                                                    <template lwc:if={appt.showWaitAlert}>
                                                        <div class="lm2-participant__wait slds-grid slds-grid_vertical-align-center">
                                                            <lightning-icon icon-name="utility:clock" size="x-small" alternative-text=""></lightning-icon>
                                                            <span class="lm2-participant__wait-label">Wait Time:</span>
                                                            <span class={appt.waitTimeClass}>{appt.waitTime}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                    </div>
                                </lightning-accordion-section>

                                <!-- Upcoming section -->
                                <lightning-accordion-section name="upcoming" label={upcomingSectionLabel}>
                                    <div class="lm2-accordion-content">
                                    <template for:each={upcomingAppointmentsFiltered} for:item="appt">
                                        <div key={appt.id} class="lm2-appt-card">
                                            <div class="lm2-appt-card__body">
                                                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                    <div class="lm2-appt-card__identity">
                                                        <div class="lm2-participant__name-row">
                                                            <a class="lm2-participant__name-link" href="#" onclick={handleApptBadgeClick} data-id={appt.id}>{appt.customerName}</a>
                                                            <span class="lm2-participant__name-sep">|</span>
                                                            <a class="lm2-participant__number-link" href="#" onclick={handleApptBadgeClick} data-id={appt.id}>{appt.appointmentNumber}</a>
                                                        </div>
                                                        <template lwc:if={appt.phone}>
                                                            <div class="lm2-participant__contact">📞 {appt.phone}</div>
                                                        </template>
                                                        <template lwc:if={appt.email}>
                                                            <div class="lm2-participant__contact">
                                                                <lightning-icon icon-name="utility:email" size="xx-small" alternative-text="Email"></lightning-icon> {appt.email}
                                                            </div>
                                                        </template>
                                                        <div class="lm2-appt-card__detail slds-truncate"><span>{appt.subtitle}</span><template lwc:if={appt.slot}><span class="lm2-appt-card__detail-sep"> • </span><span>{appt.slot}</span></template></div>
                                                    </div>
                                                    <div class="slds-no-flex lm2-appt-card__actions slds-grid slds-grid_vertical-align-center slds-m-left_x-small">
                                                        <template lwc:if={appt.showCheckin}>
                                                            <lightning-button label="Check In" variant="neutral" data-id={appt.id} onclick={handleCheckin}></lightning-button>
                                                        </template>
                                                        <lightning-button-icon icon-name="utility:down" variant="border-filled" alternative-text="Appointment actions" title="Appointment actions" data-id={appt.id} onclick={handleApptMenu}></lightning-button-icon>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="lm2-appt-card__footer">
                                                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                    <template lwc:if={appt.checkedIn}>
                                                        <span class="lm2-badge lm2-badge--checkedin">Check In: {appt.slotStart}</span>
                                                    </template>
                                                    <template lwc:if={appt.showWaitAlert}>
                                                        <div class="lm2-participant__wait slds-grid slds-grid_vertical-align-center">
                                                            <lightning-icon icon-name="utility:clock" size="x-small" alternative-text=""></lightning-icon>
                                                            <span class="lm2-participant__wait-label">Wait Time:</span>
                                                            <span class={appt.waitTimeClass}>{appt.waitTime}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                    </div>
                                </lightning-accordion-section>

                                <!-- Past section -->
                                <lightning-accordion-section name="past" label={pastSectionLabel}>
                                    <div class="lm2-accordion-content">
                                    <template for:each={pastAppointmentsFiltered} for:item="appt">
                                        <div key={appt.id} class="lm2-appt-card lm2-appt-card--past">
                                            <div class="lm2-appt-card__body">
                                                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                    <div class="lm2-appt-card__identity">
                                                        <div class="lm2-participant__name-row">
                                                            <a class="lm2-participant__name-link" href="#" onclick={handleApptBadgeClick} data-id={appt.id}>{appt.customerName}</a>
                                                            <span class="lm2-participant__name-sep">|</span>
                                                            <a class="lm2-participant__number-link" href="#" onclick={handleApptBadgeClick} data-id={appt.id}>{appt.appointmentNumber}</a>
                                                        </div>
                                                        <template lwc:if={appt.phone}>
                                                            <div class="lm2-participant__contact">📞 {appt.phone}</div>
                                                        </template>
                                                        <template lwc:if={appt.email}>
                                                            <div class="lm2-participant__contact">
                                                                <lightning-icon icon-name="utility:email" size="xx-small" alternative-text="Email"></lightning-icon> {appt.email}
                                                            </div>
                                                        </template>
                                                        <div class="lm2-appt-card__detail slds-truncate"><span>{appt.subtitle}</span><template lwc:if={appt.slot}><span class="lm2-appt-card__detail-sep"> • </span><span>{appt.slot}</span></template></div>
                                                    </div>
                                                    <div class="slds-no-flex lm2-appt-card__actions slds-grid slds-grid_vertical-align-center slds-m-left_x-small">
                                                        <template lwc:if={appt.showCheckin}>
                                                            <lightning-button label="Check In" variant="neutral" data-id={appt.id} onclick={handleCheckin}></lightning-button>
                                                        </template>
                                                        <lightning-button-icon icon-name="utility:down" variant="border-filled" alternative-text="Appointment actions" title="Appointment actions" data-id={appt.id} onclick={handleApptMenu}></lightning-button-icon>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="lm2-appt-card__footer">
                                                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                    <template lwc:if={appt.checkedIn}>
                                                        <span class="lm2-badge lm2-badge--checkedin">Check In: {appt.slotStart}</span>
                                                    </template>
                                                    <template lwc:if={appt.isLate}>
                                                        <template lwc:if={appt.showCheckin}>
                                                            <span class="lm2-badge lm2-badge--late slds-m-left_x-small">Late</span>
                                                        </template>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                    </div>
                                </lightning-accordion-section>

                            </lightning-accordion>

                        </div>
                    </article>
                </div>

                <!-- ── Column 2: General Banking Live Waitlist ── -->
                <div class="lm2-col">
                    <div class="lm2-col-header">
                        <lightning-icon icon-name="utility:people" size="xx-small" alternative-text=""></lightning-icon>
                        <span>Live Waitlists</span>
                        <span class="lm2-col-header__count">{liveWaitlistCount}</span>
                    </div>
                    <article class="lm2-card lm2-card--queue">
                        <div class="lm2-card__header slds-grid">
                            <header class="slds-col slds-has-flexi-truncate">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <span class={generalBankingDotClass} aria-hidden="true"></span>
                                    <h2 class="lm2-card__queue-name slds-m-left_x-small">General Banking</h2>
                                </div>
                                <p class="lm2-card__meta">{generalQueueMetaLeft}</p>
                                <p class="lm2-card__meta">{generalQueueMetaRight}</p>
                            </header>
                            <div class="slds-no-flex">
                                <lightning-button-group class="lm2-queue-button-group">
                                    <button class="slds-button slds-button_neutral" type="button" onclick={handleQueueCheckIn}>Check In</button>
                                    <lightning-button-icon icon-name="utility:refresh" variant="border-filled" alternative-text="Refresh queue" title="Refresh" onclick={handleRefresh}></lightning-button-icon>
                                </lightning-button-group>
                            </div>
                        </div>
                        <div class="lm2-card__body lm2-card__body--queue">
                            <lightning-accordion
                                class="lm2-queue-accordion"
                                allow-multiple-sections-open
                                active-section-name={generalBankingOpenSections}
                                onsectiontoggle={handleGeneralAccordionToggle}>
                                <template for:each={generalBankingTopicsFiltered} for:item="topic">
                                    <lightning-accordion-section key={topic.id} name={topic.id} label={topic.label}>
                                        <div class="lm2-accordion-content lm2-accordion-content--queue">
                                        <template for:each={topic.participants} for:item="row">
                                            <div key={row.id}
                                                class={row.cardClass}
                                                draggable="true"
                                                data-id={row.id}
                                                data-topic-id={topic.id}
                                                data-section="gb"
                                                ondragstart={handleDragStart}
                                                ondragover={handleDragOver}
                                                ondragleave={handleDragLeave}
                                                ondrop={handleDrop}
                                                ondragend={handleDragEnd}>
                                                <div class="lm2-participant slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                    <div class="lm2-drag-handle" title="Drag to reorder" aria-hidden="true">
                                                        <svg class="lm2-drag-handle__grip" viewBox="0 0 10 16" xmlns="http://www.w3.org/2000/svg">
                                                            <circle cx="3" cy="3" r="1.5"/><circle cx="7" cy="3" r="1.5"/>
                                                            <circle cx="3" cy="8" r="1.5"/><circle cx="7" cy="8" r="1.5"/>
                                                            <circle cx="3" cy="13" r="1.5"/><circle cx="7" cy="13" r="1.5"/>
                                                        </svg>
                                                    </div>
                                                    <div class="lm2-participant__identity slds-m-left_x-small">
                                                        <div class="lm2-participant__name-row">
                                                            <a class="lm2-participant__name-link" href="#" onclick={handleQueueNameClick} data-id={row.id}>{row.linkLabel}</a>
                                                            <span class="lm2-participant__name-sep">|</span>
                                                            <a class="lm2-participant__number-link" href="#" onclick={handleQueueBadgeClick} data-id={row.id}>{row.serviceNumber}</a>
                                                            <template lwc:if={row.isVip}>
                                                                <span class="lm2-vip-badge">VIP</span>
                                                            </template>
                                                        </div>
                                                        <template lwc:if={row.email}>
                                                            <div class="lm2-participant__contact">
                                                                <lightning-icon icon-name="utility:email" size="xx-small" alternative-text="Email"></lightning-icon> {row.email}
                                                            </div>
                                                        </template>
                                                        <template lwc:if={row.phone}>
                                                            <div class="lm2-participant__contact">📞 {row.phone}</div>
                                                        </template>
                                                        <template lwc:if={row.showAssignedResource}>
                                                            <div class="lm2-participant__resource">Assigned Resource — {row.assignedResource}</div>
                                                        </template>
                                                    </div>
                                                    <div class="slds-no-flex slds-m-left_x-small">
                                                        <lightning-button-icon
                                                            icon-name="utility:down"
                                                            variant="border-filled"
                                                            alternative-text="Participant actions"
                                                            title="Participant actions"
                                                            data-id={row.id}
                                                            onclick={handleQueueParticipantMenu}>
                                                        </lightning-button-icon>
                                                    </div>
                                                </div>
                                                <template lwc:if={row.showNotes}>
                                                    <div class="lm2-notes-field">
                                                        <textarea class="lm2-notes-field__input" placeholder="Add a note…" data-id={row.id} oninput={handleNotesInput}>{row.notes}</textarea>
                                                    </div>
                                                </template>
                                                <div class="lm2-participant__footer">
                                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                        <span class="lm2-badge lm2-badge--checkedin">Check In: {row.checkInTime}</span>
                                                        <div class="lm2-participant__wait slds-grid slds-grid_vertical-align-center">
                                                            <lightning-icon icon-name="utility:clock" size="x-small" alternative-text=""></lightning-icon>
                                                            <span class="lm2-participant__wait-label">Wait Time:</span>
                                                            <span class={row.waitTimeClass}>{row.waitTime}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                        </div>
                                    </lightning-accordion-section>
                                </template>
                            </lightning-accordion>
                        </div>

                    </article>
                </div>

                <!-- ── Column 3: Investment Banking ── -->
                <div class="lm2-col">
                    <div class="lm2-col-header lm2-col-header--hidden" aria-hidden="true">
                        <lightning-icon icon-name="utility:people" size="xx-small" alternative-text=""></lightning-icon>
                        <span>&nbsp;</span>
                    </div>
                    <article class="lm2-card lm2-card--queue">
                        <div class="lm2-card__header slds-grid">
                            <header class="slds-col slds-has-flexi-truncate">
                                <div class="slds-grid slds-grid_vertical-align-center">

                    </button>
                </div>
                <div class="lm2-chart-tabs">
                    <button class={peakPeriodDailyClass} onclick={handlePeakPeriodDaily}>Daily</button>
                    <button class={peakPeriodWeeklyClass} onclick={handlePeakPeriodWeekly}>Weekly</button>
                    <button class={peakPeriodMonthlyClass} onclick={handlePeakPeriodMonthly}>Monthly</button>
                </div>
                <div class="lm2-peak-chart">
                    <div class="lm2-peak-chart__bars">
                        <template for:each={peakHoursBars} for:item="bar">
                            <div key={bar.hour} class="lm2-peak-chart__col">
                                <div class="lm2-peak-chart__bar-wrap">
                                    <span class="lm2-peak-chart__count">{bar.label}</span>
                                    <div class={bar.barClass} style={bar.barStyle}></div>
                                </div>
                                <div class="lm2-peak-chart__hour">{bar.hour}</div>
                            </div>
                        </template>
                    </div>
                    <p class="lm2-peak-chart__caption">{peakChartCaption}</p>
                </div>
            </div>
        </template>

        <!-- ── Daily Summary Panel ── -->
        <template lwc:if={showDailySummary}>
            <div class="lm2-panel-overlay" onclick={handleToggleDailySummary}></div>
            <div class="lm2-panel lm2-panel--summary">
                <div class="lm2-panel__header">
                    <span class="lm2-panel__title">Daily Summary</span>
                    <button class="lm2-panel__close" onclick={handleToggleDailySummary} aria-label="Close">
                        <lightning-icon icon-name="utility:close" size="x-small" alternative-text="Close"></lightning-icon>
                    </button>
                </div>
                <div class="lm2-summary-grid">
                    <div class="lm2-summary-stat">
                        <div class="lm2-summary-stat__value">{dailySummaryTotalServed}</div>
                        <div class="lm2-summary-stat__label">Total Served Today</div>
                    </div>
                    <div class="lm2-summary-stat">
                        <div class="lm2-summary-stat__value">{metricTotalCheckedIn}</div>
                        <div class="lm2-summary-stat__label">Currently in Queue</div>
                    </div>
                    <div class="lm2-summary-stat">
                        <div class="lm2-summary-stat__value lm2-summary-stat__value--orange">{dailySummaryAvgWait}</div>
                        <div class="lm2-summary-stat__label">Avg Wait Time</div>
                    </div>
                    <div class="lm2-summary-stat">
                        <div class="lm2-summary-stat__value lm2-summary-stat__value--red">{dailySummaryNoShows}</div>
                        <div class="lm2-summary-stat__label">No-Shows Today</div>
                    </div>
                    <div class="lm2-summary-stat">
                        <div class="lm2-summary-stat__value">{metricActiveWaitlists}</div>
                        <div class="lm2-summary-stat__label">Active Waitlists</div>
                    </div>
                    <div class="lm2-summary-stat">
                        <div class="lm2-summary-stat__value">{metricUpcoming}</div>
                        <div class="lm2-summary-stat__label">Upcoming Appointments</div>
                    </div>
                </div>
            </div>
        </template>

        <!-- ── Transfer to Another Queue Modal ── -->
        <template lwc:if={showTransferModal}>
            <div class="lm2-modal-backdrop"></div>
            <div class="lm2-modal-container">
                <div class="lm2-modal-container__inner">
                    <button class="lm2-modal__close" onclick={handleTransferCancel} aria-label="Close">
                        <lightning-icon icon-name="utility:close" size="small" style="--slds-c-icon-color-foreground: #0176d3;"></lightning-icon>
                    </button>
                    <div class="lm2-modal lm2-modal--small" role="dialog" aria-modal="true">
                        <div class="lm2-modal__header">
                            <h2 class="lm2-modal__title">Transfer to Another Queue</h2>
                        </div>
                        <div class="lm2-modal__body">
                            <lightning-combobox
                                label="Select Waitlist"
                                value={transferTargetQueue}
                                options={transferQueueOptions}
                                placeholder="Choose a waitlist..."
                                onchange={handleTransferTargetChange}>
                            </lightning-combobox>
                            <template lwc:if={transferTopicPickerVisible}>
                                <div class="slds-m-top_small">
                                    <lightning-combobox
                                        label="Select Work Topic"
                                        value={transferTargetTopic}
                                        options={transferTopicOptions}
                                        placeholder="Choose a work topic..."
                                        onchange={handleTransferTopicChange}>
                                    </lightning-combobox>
                                </div>
                            </template>
                        </div>
                        <div class="lm2-modal__footer">
                            <lightning-button label="Cancel" onclick={handleTransferCancel}></lightning-button>
                            <lightning-button label="Transfer" variant="brand" disabled={transferConfirmDisabled} onclick={handleTransferConfirm}></lightning-button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

    </div>
</template>
