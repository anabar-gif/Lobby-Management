<template>
    <!-- Global shell: top, edge to edge, height by content -->
    <shell-global-shell current-page={currentNavPage} nav-items={navItems} onnavigate={handleNavNavigate} onpanelselect={handlePanelSelect}>
    </shell-global-shell>

    <!-- Main content and docked panel -->
    <main class="app-body">
        <lightning-layout vertical-align="stretch" class="utility-full-height">
            <lightning-layout-item flexibility="auto" class="app-body__content-cell">
                <div class="app-body__scroll-wrapper">
                    <div class="app-main">
                        <div class="app-main__inner">
                        <!-- Router outlet -->
                        <template lwc:if={componentCtor}>
                            <lwc:component lwc:is={componentCtor} onnavigateback={handleNavigateBack}></lwc:component>
                        </template>
                    </div>
                    <shell-theme-switcher
                        slds-version={_sldsVersion}
                        dark-mode={_darkMode}
                        ontoggleslds={handleToggleSLDS}
                        ontoggledarkmode={handleToggleDarkMode}>
                    </shell-theme-switcher>
                    </div>
                </div>
            </lightning-layout-item>
            <lightning-layout-item class={panelClasses}>
                <shell-panel selected-panel={selectedPanel} onpanelclose={handlePanelClose}></shell-panel>
            </lightning-layout-item>
        </lightning-layout>
    </main>

    <footer class="app-viewport-footer" role="navigation" aria-label="Workspace">
        <div class="app-viewport-footer__tabs">
            <button class="app-viewport-footer__tab" type="button" title="My Appointments">
                <lightning-icon
                    class="app-viewport-footer__tab-icon app-viewport-footer__tab-icon_bold"
                    icon-name="utility:date_input"
                    size="x-small"
                    alternative-text="">
                </lightning-icon>
                <span class="app-viewport-footer__tab-label">My Appointments</span>
            </button>
            <button class="app-viewport-footer__tab" type="button" title="Video Call">
                <lightning-icon
                    class="app-viewport-footer__tab-icon app-viewport-footer__tab-icon_muted"
                    icon-name="utility:video"
                    size="x-small"
                    alternative-text="">
                </lightning-icon>
                <span class="app-viewport-footer__tab-label">Video Call</span>
            </button>
        </div>
    </footer>
</template>
